<script>
// ── Logo por defecto (inline SVG, sustituible desde Ajustes) ──
var _EDV_ICON="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(
'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="512" height="512">'+
'<defs><linearGradient id="g" x1="10%" y1="0%" x2="90%" y2="100%">'+
'<stop offset="0%" style="stop-color:#14B8A6"/><stop offset="55%" style="stop-color:#0F9D8B"/><stop offset="100%" style="stop-color:#0B5D52"/>'+
'</linearGradient></defs>'+
'<rect x="0" y="0" width="120" height="120" rx="26" ry="26" fill="url(#g)"/>'+
'<text x="60" y="72" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="46" letter-spacing="-1" fill="white" text-anchor="middle">EDV</text>'+
'<text x="60" y="92" font-family="Arial, sans-serif" font-weight="600" font-size="10" letter-spacing="2" fill="rgba(255,255,255,0.75)" text-anchor="middle">JACA</text>'+
'</svg>'
)));

(function(){
  var img=new Image();
  img.onload=function(){
    [180,152,120].forEach(function(sz){
      var cv=document.createElement("canvas");cv.width=sz;cv.height=sz;
      var ctx=cv.getContext("2d");
      ctx.drawImage(img,0,0,sz,sz);
      var l=document.createElement("link");l.rel="apple-touch-icon";
      l.sizes=sz+"x"+sz;l.href=cv.toDataURL("image/png");
      document.head.appendChild(l);
    });
  };
  img.src=_EDV_ICON;
})();

// ── Service worker: banner de actualización ──
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js",{scope:"./"}).then((reg)=>{
    let _didSkipWaiting=false,_reloading=false;
    function _showUpdateBanner(waitingSW){
      if(document.getElementById("edv-sw-update"))return;
      const b=document.createElement("div");
      b.id="edv-sw-update";
      b.style.cssText="position:fixed;left:50%;top:calc(14px + env(safe-area-inset-top));transform:translateX(-50%);z-index:10000;background:#081014;border:1.5px solid #14B8A6;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.5);font-family:system-ui,sans-serif;color:#fff;font-size:13px;font-weight:600;max-width:92vw";
      b.innerHTML='<span>🔄 Nueva versión disponible</span><button id="edv-sw-reload" style="background:#14B8A6;border:none;color:#fff;padding:6px 12px;border-radius:8px;font-weight:700;cursor:pointer">Actualizar</button><button id="edv-sw-dismiss" style="background:transparent;border:none;color:#9ca3af;cursor:pointer;font-size:18px;line-height:1">×</button>';
      document.body.appendChild(b);
      document.getElementById("edv-sw-reload").onclick=()=>{
        _didSkipWaiting=true;
        waitingSW.postMessage("SKIP_WAITING");
      };
      document.getElementById("edv-sw-dismiss").onclick=()=>b.remove();
    }
    if(reg.waiting)_showUpdateBanner(reg.waiting);
    reg.addEventListener("updatefound",()=>{
      const nw=reg.installing;if(!nw)return;
      nw.addEventListener("statechange",()=>{
        if(nw.state==="installed" && navigator.serviceWorker.controller){
          _showUpdateBanner(nw);
        }
      });
    });
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(!_didSkipWaiting||_reloading)return;
      _reloading=true;
      window.location.reload();
    });
  }).catch(()=>{});
}
</script>

<style>

<body>
<div id="root"></div>
<input type="file" id="fileLogo" accept="image/*" style="display:none">
<input type="file" id="fileKidPhoto" accept="image/*" style="display:none">
<input type="file" id="fileActPhoto" accept="image/*" style="display:none" multiple>
<input type="file" id="fileImportJson" accept="application/json" style="display:none">

<script>
/* ============================================================
   EDV · Escuela de Verano de Jaca — v1.0.0
   Single-file PWA. Sin backend. Datos en localStorage + IndexedDB (fotos).
   ============================================================ */

// ── Persistencia ──────────────────────────────────────────────
const LSP = 'edv:';
function lsGet(k, def){ try{ const v = localStorage.getItem(LSP+k); return v!==null ? JSON.parse(v) : def; }catch(e){ return def; } }
function lsSet(k, v){ localStorage.setItem(LSP+k, JSON.stringify(v)); }

let S = {
  view: 'hoy',
  cfg: lsGet('cfg', {nombre:'EDV', grupo:'2014', anio:2026, lema:'Escuela de Verano de Jaca'}),
  kids: lsGet('kids', []),
  days: lsGet('days', {}),
  fecha: todayISO(),
  histMesFiltro: 'todos',
  modal: null,       // {tipo, ...datos}
  toastMsg: null,
};

function saveCfg(){ lsSet('cfg', S.cfg); }
function saveKids(){ lsSet('kids', S.kids); }
function saveDays(){ lsSet('days', S.days); }

// ── IndexedDB para fotos (evita saturar localStorage) ─────────
const _dbPromise = new Promise((resolve, reject)=>{
  const req = indexedDB.open('edvFotos', 1);
  req.onupgradeneeded = ()=>{ req.result.createObjectStore('fotos', {keyPath:'id'}); };
  req.onsuccess = ()=> resolve(req.result);
  req.onerror = ()=> reject(req.error);
});
async function idbPut(id, dataURL){
  const db = await _dbPromise;
  return new Promise((res, rej)=>{
    const tx = db.transaction('fotos','readwrite');
    tx.objectStore('fotos').put({id, dataURL});
    tx.oncomplete = ()=>res();
    tx.onerror = ()=>rej(tx.error);
  });
}
async function idbGet(id){
  const db = await _dbPromise;
  return new Promise((res, rej)=>{
    const tx = db.transaction('fotos','readonly');
    const r = tx.objectStore('fotos').get(id);
    r.onsuccess = ()=> res(r.result ? r.result.dataURL : null);
    r.onerror = ()=> rej(r.error);
  });
}
async function idbDelete(id){
  const db = await _dbPromise;
  return new Promise((res, rej)=>{
    const tx = db.transaction('fotos','readwrite');
    tx.objectStore('fotos').delete(id);
    tx.oncomplete = ()=>res();
    tx.onerror = ()=>rej(tx.error);
  });
}
const _photoCache = {};
function hydratePhotos(){
  document.querySelectorAll('img[data-photo-id]').forEach(async img=>{
    const id = img.dataset.photoId;
    if(_photoCache[id]){ img.src = _photoCache[id]; return; }
    const url = await idbGet(id);
    if(url){ _photoCache[id]=url; img.src = url; }
  });
}

// ── Utilidades de fecha / semanas ──────────────────────────────
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function isoWeekKey(iso){
  const d = new Date(iso+'T00:00:00Z');
  const dt = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
  const dayNum = (dt.getUTCDay()+6)%7;
  dt.setUTCDate(dt.getUTCDate()-dayNum+3);
  const firstThu = new Date(Date.UTC(dt.getUTCFullYear(),0,4));
  const fDayNum = (firstThu.getUTCDay()+6)%7;
  firstThu.setUTCDate(firstThu.getUTCDate()-fDayNum+3);
  const weekNum = 1+Math.round((dt-firstThu)/(7*86400000));
  return dt.getUTCFullYear()+'-W'+String(weekNum).padStart(2,'0');
}
function mondayOfIsoWeek(weekKey){
  const [yr, wk] = weekKey.split('-W').map(Number);
  const jan4 = new Date(Date.UTC(yr,0,4));
  const jan4Day = (jan4.getUTCDay()+6)%7;
  const week1Monday = new Date(jan4); week1Monday.setUTCDate(jan4.getUTCDate()-jan4Day);
  const monday = new Date(week1Monday); monday.setUTCDate(week1Monday.getUTCDate()+(wk-1)*7);
  return monday;
}
function fmtDDMM(d){ return String(d.getUTCDate()).padStart(2,'0')+'/'+String(d.getUTCMonth()+1).padStart(2,'0'); }
function mesDe(iso){ const m = parseInt(iso.slice(5,7),10); return m===7?'julio':m===8?'agosto':null; }
function esCampDay(iso){ // solo laborables, y solo dentro de julio-agosto del año de config
  const d = new Date(iso+'T00:00:00Z');
  const dow = d.getUTCDay();
  if(dow===0||dow===6) return false;
  return mesDe(iso)!==null && d.getUTCFullYear()===S.cfg.anio;
}
// Lista de semanas (julio+agosto del año configurado), para checkboxes de inscripción
function listaSemanas(){
  const anio = S.cfg.anio;
  const start = new Date(Date.UTC(anio,6,1));
  const end = new Date(Date.UTC(anio,7,31));
  const seen = {};
  const out = [];
  let cur = new Date(start);
  while(cur<=end){
    const iso = cur.toISOString().slice(0,10);
    if(esCampDay(iso)){
      const key = isoWeekKey(iso);
      if(!seen[key]){
        seen[key]=true;
        const mon = mondayOfIsoWeek(key);
        const fri = new Date(mon); fri.setUTCDate(mon.getUTCDate()+4);
        // recortar la etiqueta al rango real dentro de jul-ago
        const rStart = mon < start ? start : mon;
        const rEnd = fri > end ? end : fri;
        out.push({key, label: fmtDDMM(rStart)+'–'+fmtDDMM(rEnd), mes: mesDe(iso)});
      }
    }
    cur.setUTCDate(cur.getUTCDate()+1);
  }
  return out;
}
function fmtFechaEs(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('es-ES',{weekday:'long', day:'numeric', month:'long'});
}

// ── Modelo: ¿un niño está inscrito en una fecha? ───────────────
function ninoInscritoEn(kid, iso){
  const mes = mesDe(iso);
  if(mes==='julio' && kid.julioCompleto) return true;
  if(mes==='agosto' && kid.agostoCompleto) return true;
  const wk = isoWeekKey(iso);
  return (kid.semanas||[]).includes(wk);
}
function ninosDelDia(iso){
  return S.kids.filter(k=>ninoInscritoEn(k, iso));
}
function getDay(iso){
  if(!S.days[iso]){
    S.days[iso] = {valEstrellas:0, valTexto:'', actividades:[], asistencia:{}};
  }
  if(!S.days[iso].actividades) S.days[iso].actividades=[];
  if(!S.days[iso].asistencia) S.days[iso].asistencia={};
  return S.days[iso];
}

function cambiarDia(delta){
  const d = new Date(S.fecha+'T00:00:00Z');
  d.setUTCDate(d.getUTCDate()+delta);
  S.fecha = d.toISOString().slice(0,10);
  render();
}
function irAHoy(){ S.fecha = todayISO(); render(); }

function renderHoy(){
  const iso = S.fecha;
  const day = getDay(iso);
  const ninos = ninosDelDia(iso);
  const esLaborable = esCampDay(iso);

  let html = `<div class="content">`;
  html += `<div class="day-nav">
    <button class="day-nav-btn" onclick="cambiarDia(-1)">‹</button>
    <div class="day-nav-lbl" onclick="irAHoy()">
      <div class="day-nav-date">${fmtFechaEs(iso)}</div>
      <div class="day-nav-sub">${iso===todayISO()?'Hoy':'Toca para ir a hoy'}</div>
    </div>
    <button class="day-nav-btn" onclick="cambiarDia(1)">›</button>
  </div>`;

  if(!esLaborable){
    html += `<div class="empty"><div class="ei">🌴</div>Día no lectivo (fin de semana o fuera de julio–agosto).<br>Puedes seguir registrando si hubo actividad especial.</div>`;
  }

  // Asistencia
  html += `<div class="section-card"><div class="fl" style="margin-bottom:8px">Asistencia (${ninos.length} inscritos hoy)</div>`;
  if(ninos.length===0){
    html += `<div class="empty" style="padding:20px 8px"><div class="ei">🧒</div>No hay niños inscritos en esta fecha.<br>Revisa las semanas de inscripción en «Niños».</div>`;
  } else {
    ninos.forEach(k=>{
      const est = day.asistencia[k.id] || null;
      html += `<div class="att-row">
        <div class="att-name">${esc(k.nombre)}</div>
        <div class="att-opts">
          <button class="att-pill ${est==='presente'?'on-p':''}" onclick="marcarAsistencia('${k.id}','presente')">P</button>
          <button class="att-pill ${est==='ausente'?'on-a':''}" onclick="marcarAsistencia('${k.id}','ausente')">A</button>
          <button class="att-pill ${est==='justificado'?'on-j':''}" onclick="marcarAsistencia('${k.id}','justificado')">J</button>
        </div>
      </div>`;
    });
  }
  html += `</div>`;

  // Valoración colectiva
  html += `<div class="section-card">
    <div class="fl" style="margin-bottom:8px">Valoración colectiva del día</div>
    <div class="stars" style="margin-bottom:10px">${[1,2,3,4,5].map(n=>`<span class="${day.valEstrellas>=n?'fill':''}" onclick="setValEstrellas(${n})">★</span>`).join('')}</div>
    <textarea class="fi" placeholder="¿Cómo ha ido el grupo hoy en general? (opcional)" oninput="setValTexto(this.value)">${esc(day.valTexto)}</textarea>
  </div>`;

  // Actividades
  html += `<div class="fl" style="margin:16px 0 8px">Actividades del día</div>`;
  if(day.actividades.length===0){
    html += `<div class="empty" style="padding:24px 8px"><div class="ei">🎯</div>Todavía no has añadido ninguna actividad.</div>`;
  } else {
    day.actividades.forEach(act=>{
      html += renderActividad(iso, act);
    });
  }
  html += `<button class="btn-p" onclick="abrirModalActividad()">+ Añadir actividad</button>`;

  html += `</div>`;
  return html;
}

function renderActividad(iso, act){
  const fotos = act.fotos||[];
  let html = `<div class="act-card">
    <div class="act-head">
      <div class="act-name">${esc(act.nombre||'Sin título')}</div>
      <button class="act-del" onclick="borrarActividad('${act.id}')">🗑️</button>
    </div>
    <div class="fg" style="margin-bottom:8px">
      <label class="fl">Notas rápidas (qué se ha hecho, incidencias…)</label>
      <textarea class="fi" placeholder="Ej: torneo de datchball, mucha participación, incidencia con recogida de X..." oninput="setActNotas('${act.id}', this.value)">${esc(act.notas)}</textarea>
    </div>
    <button class="btn-ai" onclick="generarObservacion('${act.id}')" ${act._generando?'disabled':''}>
      ${act._generando ? '<span class="spin">⏳</span> Generando…' : '✨ Generar observación con IA'}
    </button>
    <div class="act-obs ${!act.obs?'empty-obs':''}">${act.obs ? esc(act.obs) : 'Aún no se ha generado ninguna observación para esta actividad.'}</div>

function marcarAsistencia(kidId, estado){
  const day = getDay(S.fecha);
  day.asistencia[kidId] = (day.asistencia[kidId]===estado) ? null : estado;
  saveDays(); render();
}
function setValEstrellas(n){ const day=getDay(S.fecha); day.valEstrellas = (day.valEstrellas===n)?0:n; saveDays(); render(); }
function setValTexto(v){ getDay(S.fecha).valTexto = v; saveDays(); }
function setActNotas(actId, v){
  const day = getDay(S.fecha);
  const act = day.actividades.find(a=>a.id===actId);
  if(act){ act.notas = v; saveDays(); }
}
function borrarActividad(actId){
  if(!confirm('¿Eliminar esta actividad y sus fotos?')) return;
  const day = getDay(S.fecha);
  const act = day.actividades.find(a=>a.id===actId);
  if(act && act.fotos) act.fotos.forEach(fid=>idbDelete(fid));
  day.actividades = day.actividades.filter(a=>a.id!==actId);
  saveDays(); render();
}
function abrirModalActividad(){
  S.modal = {tipo:'nuevaActividad', nombre:''};
  render();
}
function confirmarNuevaActividad(){
  const nombre = document.getElementById('m-act-nombre').value.trim();
  if(!nombre){ toast('Ponle un nombre a la actividad'); return; }
  const day = getDay(S.fecha);
  day.actividades.push({id:uid(), nombre, notas:'', obs:'', fotos:[]});
  saveDays();
  S.modal=null; render();
  toast('Actividad añadida');
}
function anadirFoto(actId){
  document.getElementById('fileActPhoto').dataset.actId = actId;
  document.getElementById('fileActPhoto').click();
}
function borrarFoto(actId, fotoId){
  const day = getDay(S.fecha);
  const act = day.actividades.find(a=>a.id===actId);
  if(!act) return;
  act.fotos = (act.fotos||[]).filter(f=>f!==fotoId);
  idbDelete(fotoId);
  saveDays(); render();
}

// ── Generación de observaciones con IA (Claude API) ─────────────
const STYLE_GUIDE = `Escribe la observación en español, en un único párrafo de entre 90 y 170 palabras, con un tono profesional y cálido propio de un informe diario de monitor de escuela de verano o campamento infantil/juvenil dirigido a las familias y a la coordinación del programa.
Describe cómo se ha desarrollado la actividad indicada, destacando de forma natural (sin exagerar ni inventar) aspectos como la participación del grupo, la colaboración entre los niños y niñas, el ambiente y la actitud general.
Si en las notas del monitor se menciona explícitamente alguna incidencia (un retraso en una recogida, un pequeño conflicto, una caída sin importancia, etc.), inclúyela con naturalidad y profesionalidad, explicando que se gestionó con calma, contactando con las personas responsables si procede, sin dramatizar.
No inventes nombres, incidencias ni datos que no estén en las notas proporcionadas. No uses listas ni viñetas: solo prosa fluida. No incluyas saludos ni firmas, solo el párrafo de observación.`;

async function generarObservacion(actId){
  const apiKey = localStorage.getItem(LSP+'apikey') || '';
  if(!apiKey){
    toast('Configura tu clave de API de Claude en Ajustes primero');
    return;
  }
  const day = getDay(S.fecha);
  const act = day.actividades.find(a=>a.id===actId);
  if(!act) return;
  if(!act.notas || !act.notas.trim()){
    toast('Añade unas notas rápidas antes de generar la observación');
    return;
  }
  act._generando = true; render();

  const model = localStorage.getItem(LSP+'aimodel') || 'claude-sonnet-5';
  const userMsg = `Grupo: ${S.cfg.grupo} (${S.cfg.nombre})
Fecha: ${fmtFechaEs(S.fecha)}
Actividad: ${act.nombre}
Notas del monitor sobre lo ocurrido hoy en esta actividad:
"""
${act.notas}
"""
Valoración colectiva del día (contexto opcional, estrellas de 1 a 5): ${day.valEstrellas || 'sin valorar'}

Redacta la observación de esta actividad siguiendo exactamente las indicaciones de estilo.`;

  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model,
        max_tokens: 500,
        system: STYLE_GUIDE,
        messages:[{role:'user', content:userMsg}]
      })
    });
    if(!resp.ok){
      const errBody = await resp.text();
      throw new Error('HTTP '+resp.status+': '+errBody.slice(0,200));
    }
    const data = await resp.json();
    const texto = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text.trim() : '';
    if(!texto) throw new Error('Respuesta vacía');
    act.obs = texto;
    saveDays();
    toast('Observación generada');
  }catch(e){
    console.error(e);
    toast('Error al generar: '+e.message.slice(0,80));
  }finally{
    act._generando = false;
    render();
  }
}

function renderNinos(){
  let html = `<div class="content">`;
  html += `<div class="stat-grid">
    <div class="sbox"><div class="sval">${S.kids.length}</div><div class="slbl">Niños/as</div></div>
    <div class="sbox"><div class="sval">${S.kids.filter(k=>k.julioCompleto).length}</div><div class="slbl">Julio completo</div></div>
  </div>`;
  if(S.kids.length===0){
    html += `<div class="empty"><div class="ei">🧒</div>Todavía no has añadido ningún niño o niña del grupo ${esc(S.cfg.grupo)}.</div>`;
  } else {
    html += `<div class="card">`;
    S.kids.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).forEach(k=>{
      const semanas = (k.semanas||[]).length;
      let meta = [];
      if(k.julioCompleto) meta.push('Julio completo');
      if(k.agostoCompleto) meta.push('Agosto completo');
      if(semanas>0) meta.push(semanas+' semana(s) suelta(s)');
      if(meta.length===0) meta.push('Sin periodo asignado');
      html += `<div class="kid-row" onclick="abrirModalNino('${k.id}')">
        <div class="kid-avatar">${k.foto?`<img src="${k.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:esc((k.nombre||'?')[0].toUpperCase())}</div>
        <div style="flex:1">
          <div class="kid-name">${esc(k.nombre)}</div>
          <div class="kid-meta">${meta.join(' · ')}</div>
        </div>
        <div style="color:var(--td)">›</div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `<button class="fab" onclick="abrirModalNino(null)">+</button>`;
  html += `</div>`;
  return html;
}

function abrirModalNino(kidId){
  const kid = kidId ? S.kids.find(k=>k.id===kidId) : {id:null, nombre:'', julioCompleto:false, agostoCompleto:false, semanas:[], foto:null};
  S.modal = {tipo:'nino', kid: JSON.parse(JSON.stringify(kid))};
  render();
}
function toggleModalNinoMes(mes){
  S.modal.kid[mes] = !S.modal.kid[mes];
  render();
}
function toggleModalNinoSemana(key){
  const sem = S.modal.kid.semanas || (S.modal.kid.semanas=[]);
  const idx = sem.indexOf(key);
  if(idx>=0) sem.splice(idx,1); else sem.push(key);
  render();
}
function guardarNino(){
  const nombre = document.getElementById('m-nino-nombre').value.trim();
  if(!nombre){ toast('Ponle un nombre al niño o niña'); return; }
  const k = S.modal.kid;
  k.nombre = nombre;
  if(k.id){
    const idx = S.kids.findIndex(x=>x.id===k.id);
    S.kids[idx] = k;
  } else {
    k.id = uid();
    S.kids.push(k);
  }
  saveKids();
  S.modal=null; render();
  toast('Guardado');
}
function borrarNino(){
  if(!confirm('¿Eliminar a este niño o niña? No se borrarán los registros de asistencia ya guardados.')) return;
  S.kids = S.kids.filter(k=>k.id!==S.modal.kid.id);
  saveKids();
  S.modal=null; render();
}

  } else {

      const pct = dias>0 ? Math.round(pres/dias*100) : 0;
      html += `<div class="kid-row" style="cursor:default">
        <div class="kid-avatar">${esc((k.nombre||'?')[0].toUpperCase())}</div>
        <div style="flex:1">
          <div class="kid-name">${esc(k.nombre)}</div>
          <div class="kid-meta">${pres}/${dias} días presente</div>
        </div>
        <div class="sval" style="font-size:20px">${dias>0?pct+'%':'—'}</div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function exportarPDF(){
  try{
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF();
    doc.setFontSize(16);
    doc.text(`${S.cfg.nombre} · Grupo ${S.cfg.grupo}`, 14, 16);
    doc.setFontSize(10);
    doc.text('Informe de asistencia julio-agosto '+S.cfg.anio, 14, 22);
    const fechas = Object.keys(S.days).sort();
    const body = S.kids.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).map(k=>{
      let dias=0, pres=0, aus=0, just=0;
      fechas.forEach(iso=>{
        if(!ninoInscritoEn(k, iso)) return;
        const est = (S.days[iso].asistencia||{})[k.id];
        if(est){ dias++; if(est==='presente')pres++; if(est==='ausente')aus++; if(est==='justificado')just++; }
      });
      return [k.nombre, dias, pres, aus, just, dias>0?Math.round(pres/dias*100)+'%':'—'];
    });
    doc.autoTable({
      startY:28,
      head:[['Nombre','Días','Presente','Ausente','Justificado','% asistencia']],
      body,
      styles:{fontSize:9}
    });
    doc.save(`EDV_${S.cfg.grupo}_informe.pdf`);
    toast('PDF exportado');
  }catch(e){ console.error(e); toast('Error al exportar PDF'); }
}

function exportarExcel(){
  try{
    const fechas = Object.keys(S.days).sort();
    const wsData = [['Nombre', ...fechas.map(f=>f)]];
    S.kids.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).forEach(k=>{
      const row = [k.nombre];
      fechas.forEach(iso=>{
        if(!ninoInscritoEn(k, iso)){ row.push(''); return; }
        const est = (S.days[iso].asistencia||{})[k.id];
        row.push(est==='presente'?'P':est==='ausente'?'A':est==='justificado'?'J':'');
      });
      wsData.push(row);
    });
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Asistencia');
    XLSX.writeFile(wb, `EDV_${S.cfg.grupo}_asistencia.xlsx`);
    toast('Excel exportado');
  }catch(e){ console.error(e); toast('Error al exportar Excel'); }
}

    </div>

      <select class="fi" id="ajustes-aimodel">
        <option value="claude-sonnet-5" ${aiModel==='claude-sonnet-5'?'selected':''}>Claude Sonnet 5 (recomendado)</option>
        <option value="claude-haiku-4-5-20251001" ${aiModel==='claude-haiku-4-5-20251001'?'selected':''}>Claude Haiku 4.5 (rápido y económico)</option>
        <option value="claude-opus-4-8" ${aiModel==='claude-opus-4-8'?'selected':''}>Claude Opus 4.8 (más elaborado)</option>
      </select>
    </div>
    <button class="btn-p" onclick="guardarAjustesIA()">Guardar clave y modelo</button>
  </div>`;

  html += `<div class="stg-sec">
    <div class="stg-sec-title">Copia de seguridad</div>
    <button class="btn-s" onclick="exportarBackupJSON()">⬇️ Exportar copia de seguridad (.json)</button>
    <button class="btn-s" onclick="document.getElementById('fileImportJson').click()">⬆️ Restaurar desde copia de seguridad</button>
  </div>`;

  html += `<div class="stg-sec">
    <div class="stg-sec-title">Zona de peligro</div>
    <button class="btn-d" onclick="borrarTodosLosDatos()">🗑️ Borrar todos los datos de este dispositivo</button>
  </div>`;

function guardarAjustesPrograma(){
  S.cfg.nombre = document.getElementById('ajustes-nombre').value.trim() || 'EDV';
  S.cfg.grupo = document.getElementById('ajustes-grupo').value.trim() || '2014';
  S.cfg.anio = parseInt(document.getElementById('ajustes-anio').value,10) || 2026;
  saveCfg(); render(); toast('Guardado');
}
function guardarAjustesIA(){
  const key = document.getElementById('ajustes-apikey').value.trim();
  const model = document.getElementById('ajustes-aimodel').value;
  localStorage.setItem(LSP+'apikey', key);
  localStorage.setItem(LSP+'aimodel', model);
  toast('Configuración de IA guardada');
}
function exportarBackupJSON(){
  const backup = {version:1, exportado: new Date().toISOString(), cfg:S.cfg, kids:S.kids, days:S.days};
  const blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `EDV_backup_${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Copia de seguridad descargada (no incluye fotos)');
}
function borrarTodosLosDatos(){
  if(!confirm('Esto borrará niños, asistencia, actividades y fotos de este dispositivo. ¿Seguro?')) return;
  if(!confirm('Confirma otra vez: esta acción no se puede deshacer.')) return;
  Object.keys(localStorage).filter(k=>k.startsWith(LSP)).forEach(k=>localStorage.removeItem(k));
  indexedDB.deleteDatabase('edvFotos');
  location.reload();
}

        <button class="tswitch ${k.agostoCompleto?'on':''}" onclick="toggleModalNinoMes('agostoCompleto')"></button>
      </div>
      <div class="fl" style="margin:12px 0 8px">O semanas sueltas (si no está el mes completo)</div>

// ================= Inputs de archivo (logo, foto niño, fotos actividad, import) =================
function fileToDataURL(file, maxDim, cb){
  const reader = new FileReader();
  reader.onload = ()=>{
    const img = new Image();
    img.onload = ()=>{
      let {width, height} = img;
      if(width>maxDim || height>maxDim){
        const scale = maxDim/Math.max(width,height);
        width = Math.round(width*scale); height = Math.round(height*scale);
      }
      const cv = document.createElement('canvas'); cv.width=width; cv.height=height;
      cv.getContext('2d').drawImage(img,0,0,width,height);
      cb(cv.toDataURL('image/jpeg', 0.82));
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('fileLogo').addEventListener('change', function(e){
  const file = e.target.files[0]; if(!file) return;
  fileToDataURL(file, 400, dataURL=>{
    localStorage.setItem(LSP+'logo', dataURL);
    render(); toast('Logo actualizado');
  });
  e.target.value='';
});

document.getElementById('fileKidPhoto').addEventListener('change', function(e){
  const file = e.target.files[0]; if(!file || !S.modal || S.modal.tipo!=='nino') return;
  fileToDataURL(file, 300, dataURL=>{
    S.modal.kid.foto = dataURL;
    render();
  });
  e.target.value='';
});

document.getElementById('fileActPhoto').addEventListener('change', async function(e){
  const actId = e.target.dataset.actId;
  const files = Array.from(e.target.files||[]);
  if(!actId || files.length===0) return;
  const day = getDay(S.fecha);
  const act = day.actividades.find(a=>a.id===actId);
  if(!act) return;
  for(const file of files){
    await new Promise(resolve=>{
      fileToDataURL(file, 1000, async dataURL=>{
        const fid = uid();
        await idbPut(fid, dataURL);
        act.fotos = act.fotos||[];
        act.fotos.push(fid);
        resolve();
      });
    });
  }
  saveDays(); render();
  e.target.value='';
});

document.getElementById('fileImportJson').addEventListener('change', function(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!confirm('Esto sustituirá los datos actuales de niños, asistencia y actividades (no las fotos) por los del archivo. ¿Continuar?')) return;
      S.cfg = data.cfg || S.cfg;
      S.kids = data.kids || [];
      S.days = data.days || {};
      saveCfg(); saveKids(); saveDays();
      render(); toast('Datos restaurados');
    }catch(err){ toast('Archivo inválido'); }
  };
  reader.readAsText(file);
  e.target.value='';
});

// ── Arranque ──
render();
</script>
