<!DOCTYPE html>
<html lang="es">
<head>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EDV">
<meta name="theme-color" content="#081014">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
// ── Logo por defecto (inline SVG, sustituible desde Ajustes) ──
var _EDV_ICON="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(
'<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="512" height="512">'+
'<defs><linearGradient id="g" x1="10%" y1="0%" x2="90%" y2="100%">'+
'<stop offset="0%" style="stop-color:#14B8A6"/><stop offset="55%" style="stop-color:#0F9D8B"/><stop offset="100%" style="stop-color:#0B5D52"/>'+
'</linearGradient></defs>'+
'<rect x="0" y="0" width="120" height="120" rx="26" ry="26" fill="url(#g)"/>'+
'<text x="60" y="72" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="46" letter-spacing="-1" fill="white" text-anchor="middle">EDV</text>'+
'<text x="60" y="92" font-family="Arial, sans-serif" font-weight="600" font-size="10" letter-spacing="2" fill="rgba(255,255,255,0.75)" text-anchor="middle">JACA</text>'+
'</svg>'
)));

(function(){
  var img=new Image();
  img.onload=function(){
    [180,152,120].forEach(function(sz){
      var cv=document.createElement("canvas");cv.width=sz;cv.height=sz;
      var ctx=cv.getContext("2d");
      ctx.drawImage(img,0,0,sz,sz);
      var l=document.createElement("link");l.rel="apple-touch-icon";
      l.sizes=sz+"x"+sz;l.href=cv.toDataURL("image/png");
      document.head.appendChild(l);
    });
  };
  img.src=_EDV_ICON;
})();

// ── Service worker: banner de actualización ──
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js",{scope:"./"}).then((reg)=>{
    let _didSkipWaiting=false,_reloading=false;
    function _showUpdateBanner(waitingSW){
      if(document.getElementById("edv-sw-update"))return;
      const b=document.createElement("div");
      b.id="edv-sw-update";
      b.style.cssText="position:fixed;left:50%;top:calc(14px + env(safe-area-inset-top));transform:translateX(-50%);z-index:10000;background:#081014;border:1.5px solid #14B8A6;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.5);font-family:system-ui,sans-serif;color:#fff;font-size:13px;font-weight:600;max-width:92vw";
      b.innerHTML='<span>🔄 Nueva versión disponible</span><button id="edv-sw-reload" style="background:#14B8A6;border:none;color:#fff;padding:6px 12px;border-radius:8px;font-weight:700;cursor:pointer">Actualizar</button><button id="edv-sw-dismiss" style="background:transparent;border:none;color:#9ca3af;cursor:pointer;font-size:18px;line-height:1">×</button>';
      document.body.appendChild(b);
      document.getElementById("edv-sw-reload").onclick=()=>{
        _didSkipWaiting=true;
        waitingSW.postMessage("SKIP_WAITING");
      };
      document.getElementById("edv-sw-dismiss").onclick=()=>b.remove();
    }
    if(reg.waiting)_showUpdateBanner(reg.waiting);
    reg.addEventListener("updatefound",()=>{
      const nw=reg.installing;if(!nw)return;
      nw.addEventListener("statechange",()=>{
        if(nw.state==="installed" && navigator.serviceWorker.controller){
          _showUpdateBanner(nw);
        }
      });
    });
    navigator.serviceWorker.addEventListener("controllerchange",()=>{
      if(!_didSkipWaiting||_reloading)return;
      _reloading=true;
      window.location.reload();
    });
  }).catch(()=>{});
}
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{overscroll-behavior-y:none;}
:root{
  --teal:#14B8A6;--teal2:#0B5D52;--tealG:linear-gradient(135deg,#14B8A6,#0B5D52);
  --sun:#F5A623;
  --bg:#081014;--s:#0c1a1e;--s2:#112428;--s3:#1a3438;--border:#1c3438;
  --tx:#eef7f5;--td:#7fa89f;--tm:#3f645d;
  --green:#22c55e;--red:#ef4444;--amber:#f59e0b;--gray:#6b7280;
  --font-d:'Barlow Condensed',system-ui,sans-serif;
  --font-b:'DM Sans',system-ui,sans-serif;
  --r:12px;
}
body{font-family:var(--font-b);background:var(--bg);color:var(--tx);min-height:100vh;min-height:100dvh;background-image:radial-gradient(rgba(20,184,166,0.10) 1px,transparent 1px);background-size:24px 24px;overflow-x:hidden;-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
#root{max-width:430px;margin:0 auto;position:relative;overflow-x:hidden;}

.header{padding:13px 16px;background:rgba(6,14,16,0.92);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);padding-top:calc(14px + env(safe-area-inset-top));}
.hrow{display:flex;align-items:center;gap:10px;}
.hlogo{width:34px;height:34px;border-radius:9px;object-fit:cover;flex-shrink:0;}
.htitle{font-family:var(--font-d);font-weight:900;font-size:19px;letter-spacing:.3px;line-height:1.1;}
.hsub{font-size:10.5px;color:var(--td);font-weight:600;letter-spacing:.5px;}
.bbtn{background:var(--s2);border:1px solid var(--border);color:var(--tx);width:36px;height:36px;border-radius:9px;cursor:pointer;font-size:17px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}

.nav{display:flex;background:rgba(9,20,22,0.95);border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 10px;border:none;background:transparent;color:var(--tm);cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;font-family:var(--font-b);transition:color .15s ease;}
.nb:active{opacity:.65;}
.nb.on{color:var(--teal);}
.nb .ni{font-size:19px;line-height:1.2;}

.content{padding:14px 16px 90px;padding-bottom:calc(90px + env(safe-area-inset-bottom));overflow-x:hidden;}
.content.view-enter{animation:fadeIn .18s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.sval{font-family:var(--font-d);font-weight:900;font-size:34px;color:var(--teal);line-height:1;}
.slbl{font-size:10px;color:var(--td);font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-top:4px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.sbox{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;}
.card{background:var(--s);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;}
.section-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.sec-head{display:flex;align-items:center;gap:8px;margin-bottom:11px;}
.sec-icon{font-size:14px;line-height:1;}
.sec-title{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--td);flex:1;}
.sec-count{font-size:10.5px;color:var(--teal);font-weight:700;flex-shrink:0;}
.day-summary{display:flex;gap:8px;margin-bottom:14px;}
.day-summary-item{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center;}
.day-summary-val{font-family:var(--font-d);font-weight:900;font-size:19px;line-height:1;color:var(--tx);}
.day-summary-val.green{color:var(--green);}
.day-summary-val.red{color:var(--red);}
.day-summary-val.teal{color:var(--teal);}
.day-summary-val.amber{color:var(--amber);}
.day-summary-lbl{font-size:8.5px;color:var(--td);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:3px;}

.day-nav{display:flex;align-items:center;background:var(--s);padding:10px 6px;border-radius:12px;border:1px solid var(--border);margin-bottom:14px;gap:4px;}
.day-nav-btn{background:var(--s2);border:1px solid var(--border);color:var(--tx);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .1s ease;}
.day-nav-btn:active{transform:scale(.9);}
.day-nav-lbl{flex:1;text-align:center;}
.day-nav-date{font-family:var(--font-d);font-weight:800;font-size:16px;text-transform:capitalize;}
.day-nav-sub{font-size:10.5px;color:var(--td);}
.badge-mes{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:rgba(20,184,166,.15);color:var(--teal);}

.fg{margin-bottom:13px;}
.fl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--td);margin-bottom:5px;display:block;}
.fi{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:11px 12px;color:var(--tx);font-size:16px;outline:none;font-family:var(--font-b);min-height:44px;box-sizing:border-box;}
.fi:focus{border-color:var(--teal);}
textarea.fi{min-height:80px;resize:vertical;line-height:1.5;}
.frow{display:flex;gap:8px;}.frow .fg{flex:1;}

.btn-p{width:100%;padding:13px;border:none;border-radius:9px;font-weight:800;font-size:15px;cursor:pointer;background:var(--tealG);color:white;margin-top:4px;box-shadow:0 3px 14px rgba(20,184,166,.28);transition:transform .1s ease;}
.btn-p:active{transform:scale(.98);}
.btn-p:disabled{opacity:.5;cursor:not-allowed;}
.btn-s{width:100%;padding:13px;border:1px solid var(--border);border-radius:9px;font-weight:700;font-size:15px;cursor:pointer;background:var(--s2);color:var(--td);margin-top:8px;transition:transform .1s ease;}
.btn-s:active{transform:scale(.98);}
.btn-d{width:100%;padding:13px;border:1px solid rgba(239,68,68,.3);border-radius:9px;font-weight:700;font-size:15px;cursor:pointer;background:rgba(239,68,68,.08);color:#ef4444;margin-top:8px;transition:transform .1s ease;}
.btn-d:active{transform:scale(.98);}
.btn-ai{width:100%;padding:11px;border:1px solid rgba(245,166,35,.4);border-radius:9px;font-weight:800;font-size:13.5px;cursor:pointer;background:rgba(245,166,35,.1);color:var(--sun);margin-top:6px;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .1s ease;}
.btn-ai:active{transform:scale(.98);}
.btn-ai:disabled{opacity:.5;cursor:not-allowed;}

.fab{position:fixed;bottom:calc(74px + env(safe-area-inset-bottom));right:calc(50% - 200px);width:52px;height:52px;border-radius:14px;background:var(--tealG);border:none;cursor:pointer;font-size:28px;color:white;box-shadow:0 4px 24px rgba(20,184,166,.45);z-index:99;}
@media (min-width:430px){.fab{right:calc(50% - 200px);}}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;}
.modal{background:var(--s);border-radius:20px 20px 0 0;border-top:1px solid var(--border);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:20px;max-height:92vh;overflow-y:auto;overscroll-behavior-y:contain;box-sizing:border-box;z-index:10000;animation:modalSlideUp .25s ease;}
.modal.modal-static{animation:none;}
@keyframes modalSlideUp{from{transform:translateX(-50%) translateY(100%);}to{transform:translateX(-50%) translateY(0);}}
.mhandle{width:100%;height:22px;background:transparent;margin:-8px auto 6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mhandle::after{content:"";display:block;width:34px;height:4px;background:var(--s3);border-radius:2px;}
.mtitle{font-family:var(--font-d);font-weight:900;font-size:21px;margin-bottom:4px;}
.msub{font-size:13px;color:var(--td);margin-bottom:14px;line-height:1.5;}

.kid-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px;cursor:pointer;transition:background .15s ease;}
.kid-row:active{background:var(--s3);}
.kid-row:last-child{border-bottom:none;}
.kid-avatar{width:38px;height:38px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:800;font-size:15px;color:var(--teal);flex-shrink:0;object-fit:cover;}
.kid-name{font-weight:700;font-size:14.5px;}
.kid-meta{font-size:11px;color:var(--td);margin-top:1px;}
.kid-note{font-size:10.5px;color:var(--sun);font-weight:600;margin-top:3px;line-height:1.35;}
.kid-note-just{color:var(--amber);}
.au-estado{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0;text-align:right;}
.au-estado.activa{color:var(--amber);}
.au-estado.proxima{color:var(--teal);}
.au-estado.pasada{color:var(--td);}

.att-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;}
.att-avatar{width:32px;height:32px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:800;font-size:13px;color:var(--teal);flex-shrink:0;object-fit:cover;}
.att-row:last-child{border-bottom:none;}
.att-name{flex:1;}
.att-name-txt{font-weight:600;font-size:14.5px;}
.att-note{font-size:10.5px;color:var(--sun);font-weight:600;margin-top:2px;line-height:1.35;}
.att-note-just{color:var(--amber);}
.att-cycle{min-width:100px;padding:9px 10px;border-radius:9px;border:none;font-size:12px;font-weight:800;font-family:var(--font-b);cursor:pointer;text-align:center;flex-shrink:0;transition:background .15s ease,color .15s ease,transform .1s ease;}
.att-cycle:active{transform:scale(.95);}
.att-cycle-none{background:var(--s2);color:var(--td);border:1px solid var(--border);}
.att-cycle-presente{background:var(--green);color:#08150f;}
.att-cycle-ausente{background:var(--red);color:#fff;}

.bulk-row{display:flex;gap:6px;margin-bottom:8px;}
.bulk-btn{flex:1;padding:9px 4px;border-radius:8px;border:1px solid var(--border);background:var(--s2);font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:transform .1s ease,background .15s ease;font-family:var(--font-b);}
.bulk-btn:active{transform:scale(.95);}
.bulk-btn.bp{color:var(--green);}
.bulk-btn.ba{color:var(--red);}
.bulk-reset{display:block;width:100%;background:transparent;border:none;color:var(--td);font-size:11px;font-weight:600;cursor:pointer;padding:4px 0 12px;text-align:center;}
.bulk-reset:active{opacity:.6;}

.week-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:6px;}
.week-chip{padding:9px 8px;border-radius:9px;border:1px solid var(--border);background:var(--s2);cursor:pointer;text-align:center;font-size:12px;font-weight:700;color:var(--td);transition:background .15s ease,border-color .15s ease,color .15s ease,transform .1s ease;}
.week-chip:active{transform:scale(.96);}
.week-chip.on{border-color:var(--teal);background:rgba(20,184,166,.15);color:var(--teal);}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.toggle-row:last-child{border-bottom:none;}
.toggle-info{flex:1;padding-right:12px;}
.toggle-title{font-weight:700;font-size:14px;}
.toggle-desc{font-size:12px;color:var(--td);margin-top:2px;line-height:1.4;}
.tswitch{width:46px;height:26px;background:var(--s3);border-radius:13px;cursor:pointer;position:relative;border:none;flex-shrink:0;}
.tswitch.on{background:var(--teal);}
.tswitch::after{content:"";width:20px;height:20px;background:white;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .2s;}
.tswitch.on::after{transform:translateX(20px);}

.stars span{font-size:26px;cursor:pointer;line-height:1;color:var(--s3);transition:color .15s ease,transform .1s ease;display:inline-block;}
.stars span:active{transform:scale(.85);}
.stars span.fill{color:var(--sun);}

.act-card{background:var(--s2);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:12px;padding:14px;margin-bottom:12px;}
.act-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.act-name{font-family:var(--font-d);font-weight:800;font-size:17px;display:flex;align-items:center;gap:7px;}
.act-del{background:transparent;border:none;color:var(--td);font-size:16px;cursor:pointer;padding:4px 7px;border-radius:7px;}
.act-del:active{background:var(--s3);}
.act-sub-lbl{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--td);margin:14px 0 7px;}
.act-obs{background:var(--s);border:1px solid var(--border);border-radius:8px;padding:11px;font-size:13px;line-height:1.6;color:var(--tx);white-space:pre-wrap;margin-top:10px;}
.act-obs.empty-obs{color:var(--tm);font-style:italic;}

.photo-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px;}
.photo-thumb{width:70px;height:70px;border-radius:9px;object-fit:cover;background:var(--s3);flex-shrink:0;cursor:pointer;border:1px solid var(--border);transition:transform .15s;}
.photo-thumb:active{transform:scale(.94);}
.photo-add{width:70px;height:70px;border-radius:9px;background:var(--s3);border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;color:var(--td);flex-shrink:0;}
.photo-thumb-wrap{position:relative;}
.photo-del{position:absolute;top:-5px;right:-5px;background:#ef4444;color:white;border:2px solid var(--s2);border-radius:50%;width:20px;height:20px;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;}
.photo-view-wrap{background:var(--s3);border-radius:12px;overflow:hidden;margin-bottom:14px;display:flex;align-items:center;justify-content:center;min-height:180px;}
.photo-view-img{width:100%;max-height:58vh;object-fit:contain;display:block;}

.logo-upload{width:80px;height:80px;border-radius:14px;background:var(--s2);border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin:0 auto 8px;overflow:hidden;}
.logo-upload img{width:100%;height:100%;object-fit:cover;}

.export-bar{display:flex;gap:8px;margin-bottom:14px;}
.btn-xpdf{flex:1;padding:10px 8px;border:1px solid rgba(239,68,68,.35);border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;background:rgba(239,68,68,.08);color:#ef4444;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-xxls{flex:1;padding:10px 8px;border:1px solid rgba(34,197,94,.35);border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;background:rgba(34,197,94,.08);color:#22c55e;display:flex;align-items:center;justify-content:center;gap:6px;}

.hist-row{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s ease;}
.hist-row:active{background:var(--s3);}
.hist-row:last-child{border-bottom:none;}
.hist-date{font-weight:700;font-size:14px;text-transform:capitalize;}
.hist-meta{font-size:11.5px;color:var(--td);margin-top:2px;}

.toast{display:none;position:fixed;top:calc(68px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:14px;font-weight:600;z-index:10001;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6);max-width:90vw;overflow:hidden;text-overflow:ellipsis;}

.empty{text-align:center;padding:40px 16px;color:var(--tm);}
.empty .ei{font-size:40px;margin-bottom:10px;}
.stg-sec{margin-bottom:18px;}
.stg-sec-title{font-size:10px;font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:var(--teal);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}

<body>
<div id="root"></div>
<input type="file" id="fileLogo" accept="image/*" style="display:none">
<input type="file" id="fileKidPhoto" accept="image/*" style="display:none">
<input type="file" id="fileActPhoto" accept="image/*" style="display:none" multiple>
<input type="file" id="fileImportJson" accept="application/json" style="display:none">

<script>
/* ============================================================
   EDV · Escuela de Verano de Jaca — v1.2.0
   Single-file PWA. Sin backend. Datos en localStorage + IndexedDB (fotos).
   ============================================================ */

// ── Persistencia ──────────────────────────────────────────────
const LSP = 'edv:';
function lsGet(k, def){ try{ const v = localStorage.getItem(LSP+k); return v!==null ? JSON.parse(v) : def; }catch(e){ return def; } }
function lsSet(k, v){ localStorage.setItem(LSP+k, JSON.stringify(v)); }

let S = {
  view: 'hoy',
  cfg: lsGet('cfg', {nombre:'EDV', grupo:'2014', anio:2026, lema:'Escuela de Verano de Jaca'}),
  kids: lsGet('kids', []),
  days: lsGet('days', {}),
  ausencias: lsGet('ausencias', []),   // [{id, kidId, desde, hasta}] — periodos de ausencia justificada
  fecha: todayISO(),
  histMesFiltro: 'todos',
  ninosFiltro: 'activos',   // 'activos' | 'archivados' — filtro de la lista de Niños
  modal: null,       // {tipo, ...datos}
};

// Migración: los nombres de niños/as se guardan siempre en mayúsculas.
// Sube automáticamente a mayúsculas los que ya estuvieran guardados en minúscula.
(function migrarNombresMayusculas(){
  let cambiado = false;
  S.kids.forEach(k=>{
    if(k.nombre && k.nombre !== k.nombre.toUpperCase()){
      k.nombre = k.nombre.toUpperCase();
      cambiado = true;
    }
  });
  if(cambiado) saveKids();
})();

// Migración: las ausencias justificadas (antes un único rango por niño/a,
// guardado como k.justDesde/k.justHasta) pasan a vivir en S.ausencias como
// periodos independientes, para poder tener varios por niño/a a lo largo
// del verano. Se traslada el rango existente (si lo hubiera) y se elimina
// del propio niño/a.
(function migrarAusenciasJustificadas(){
  let cambiadoKids = false, cambiadoAus = false;
  S.kids.forEach(k=>{
    if(k.justDesde || k.justHasta){
      S.ausencias.push({id: uid(), kidId: k.id, desde: k.justDesde||'', hasta: k.justHasta||''});
      delete k.justDesde; delete k.justHasta;
      cambiadoKids = true; cambiadoAus = true;
    }
  });
  if(cambiadoKids) saveKids();
  if(cambiadoAus) saveAusencias();
})();

// Migración: se elimina el estado "Justificado" como marca de asistencia
// independiente (no aportaba nada distinto de "Ausente" a efectos de
// estadísticas). El motivo, si se conocía, ya vive en S.ausencias. Las
// marcas de días ya guardados con "justificado" pasan a "ausente".
(function migrarJustificadoAAusente(){
  let cambiado = false;
  Object.values(S.days).forEach(day=>{
    if(!day.asistencia) return;
    Object.keys(day.asistencia).forEach(kidId=>{
      if(day.asistencia[kidId]==='justificado'){
        day.asistencia[kidId] = 'ausente';
        cambiado = true;
      }
    });
  });
  if(cambiado) saveDays();
})();

function saveCfg(){ lsSet('cfg', S.cfg); }
function saveKids(){ lsSet('kids', S.kids); }
function saveDays(){ lsSet('days', S.days); }
function saveAusencias(){ lsSet('ausencias', S.ausencias); }

// ── IndexedDB para fotos (evita saturar localStorage) ─────────
const _dbPromise = new Promise((resolve, reject)=>{
  const req = indexedDB.open('edvFotos', 1);
  req.onupgradeneeded = ()=>{ req.result.createObjectStore('fotos', {keyPath:'id'}); };
  req.onsuccess = ()=> resolve(req.result);
  req.onerror = ()=> reject(req.error);
});
async function idbPut(id, dataURL){
  const db = await _dbPromise;
  return new Promise((res, rej)=>{
    const tx = db.transaction('fotos','readwrite');
    tx.objectStore('fotos').put({id, dataURL});
    tx.oncomplete = ()=>res();
    tx.onerror = ()=>rej(tx.error);
  });
}
async function idbGet(id){
  const db = await _dbPromise;
  return new Promise((res, rej)=>{
    const tx = db.transaction('fotos','readonly');
    const r = tx.objectStore('fotos').get(id);
    r.onsuccess = ()=> res(r.result ? r.result.dataURL : null);
    r.onerror = ()=> rej(r.error);
  });
}
async function idbDelete(id){
  const db = await _dbPromise;
  return new Promise((res, rej)=>{
    const tx = db.transaction('fotos','readwrite');
    tx.objectStore('fotos').delete(id);
    tx.oncomplete = ()=>res();
    tx.onerror = ()=>rej(tx.error);
  });
}
const _photoCache = {};
function hydratePhotos(){
  document.querySelectorAll('img[data-photo-id]').forEach(async img=>{
    const id = img.dataset.photoId;
    if(_photoCache[id]){ img.src = _photoCache[id]; return; }
    const url = await idbGet(id);
    if(url){ _photoCache[id]=url; img.src = url; }
  });
}

// ── Utilidades de fecha / semanas ──────────────────────────────
function todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function isoWeekKey(iso){
  const d = new Date(iso+'T00:00:00Z');
  const dt = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate()));
  const dayNum = (dt.getUTCDay()+6)%7;
  dt.setUTCDate(dt.getUTCDate()-dayNum+3);
  const firstThu = new Date(Date.UTC(dt.getUTCFullYear(),0,4));
  const fDayNum = (firstThu.getUTCDay()+6)%7;
  firstThu.setUTCDate(firstThu.getUTCDate()-fDayNum+3);
  const weekNum = 1+Math.round((dt-firstThu)/(7*86400000));
  return dt.getUTCFullYear()+'-W'+String(weekNum).padStart(2,'0');
}
function mondayOfIsoWeek(weekKey){
  const [yr, wk] = weekKey.split('-W').map(Number);
  const jan4 = new Date(Date.UTC(yr,0,4));
  const jan4Day = (jan4.getUTCDay()+6)%7;
  const week1Monday = new Date(jan4); week1Monday.setUTCDate(jan4.getUTCDate()-jan4Day);
  const monday = new Date(week1Monday); monday.setUTCDate(week1Monday.getUTCDate()+(wk-1)*7);
  return monday;
}
function fmtDDMM(d){ return String(d.getUTCDate()).padStart(2,'0')+'/'+String(d.getUTCMonth()+1).padStart(2,'0'); }
function mesDe(iso){ const m = parseInt(iso.slice(5,7),10); return m===7?'julio':m===8?'agosto':null; }
function esCampDay(iso){ // solo laborables, y solo dentro de julio-agosto del año de config
  const d = new Date(iso+'T00:00:00Z');
  const dow = d.getUTCDay();
  if(dow===0||dow===6) return false;
  return mesDe(iso)!==null && d.getUTCFullYear()===S.cfg.anio;
}
// Lista de semanas (julio+agosto del año configurado), para checkboxes de inscripción
function listaSemanas(){
  const anio = S.cfg.anio;
  const start = new Date(Date.UTC(anio,6,1));
  const end = new Date(Date.UTC(anio,7,31));
  const seen = {};
  const out = [];
  let cur = new Date(start);
  while(cur<=end){
    const iso = cur.toISOString().slice(0,10);
    if(esCampDay(iso)){
      const key = isoWeekKey(iso);
      if(!seen[key]){
        seen[key]=true;
        const mon = mondayOfIsoWeek(key);
        const fri = new Date(mon); fri.setUTCDate(mon.getUTCDate()+4);
        // recortar la etiqueta al rango real dentro de jul-ago
        const rStart = mon < start ? start : mon;
        const rEnd = fri > end ? end : fri;
        out.push({key, label: fmtDDMM(rStart)+'–'+fmtDDMM(rEnd), mes: mesDe(iso)});
      }
    }
    cur.setUTCDate(cur.getUTCDate()+1);
  }
  return out;
}
function fmtFechaEs(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('es-ES',{weekday:'long', day:'numeric', month:'long'});
}
// ── Ausencias justificadas (periodos por niño/a, independientes del alta) ──
function ausenciasDeNino(kidId){
  return S.ausencias.filter(a=>a.kidId===kidId).sort((a,b)=>(a.desde||'').localeCompare(b.desde||''));
}
// ¿Hay una ausencia justificada activa para este niño/a en esta fecha concreta?
function ausenciaEnFecha(kidId, iso){
  return S.ausencias.find(a=>{
    if(a.kidId!==kidId) return false;
    if(a.desde && iso<a.desde) return false;
    if(a.hasta && iso>a.hasta) return false;
    return true;
  }) || null;
}
// Para vistas no ligadas a un día concreto (p. ej. "Niños"): la ausencia activa
// hoy, o si no hay ninguna activa, la próxima que empiece.
function ausenciaProximaOActiva(kidId){
  const hoy = todayISO();
  const activa = ausenciaEnFecha(kidId, hoy);
  if(activa) return activa;
  const futuras = ausenciasDeNino(kidId).filter(a=>a.desde && a.desde>hoy);
  return futuras.length ? futuras[0] : null;
}
// Texto informativo de un periodo de ausencia justificada (fechas + motivo).
// Ya no existe un estado de asistencia "Justificado" separado — esto es solo
// contexto: la marca real del día es Presente/Ausente/Sin marcar.
function formatAusencia(a){
  if(!a) return '';
  const f = iso => fmtDDMM(new Date(iso+'T00:00:00Z'));
  let txt;
  if(a.desde && a.hasta) txt = `Ausencia justificada del ${f(a.desde)} al ${f(a.hasta)}`;
  else if(a.hasta) txt = `Ausencia justificada hasta el ${f(a.hasta)}`;
  else txt = `Ausencia justificada desde el ${f(a.desde)}`;
  if(a.motivo) txt += ' — ' + esc(a.motivo);
  return txt;
}

// ── Modelo: ¿un niño está inscrito en una fecha? ───────────────
function ninoInscritoEn(kid, iso){
  const mes = mesDe(iso);
  if(mes==='julio' && kid.julioCompleto) return true;
  if(mes==='agosto' && kid.agostoCompleto) return true;
  const wk = isoWeekKey(iso);
  return (kid.semanas||[]).includes(wk);
}
function ninosDelDia(iso){
  // Los niños/as archivados no aparecen en Hoy, aunque su periodo cubra la fecha.
  return S.kids.filter(k=>!k.archivado && ninoInscritoEn(k, iso));
}
// Estado de asistencia "efectivo" para un niño/a en una fecha: la marca
// explícita si existe (aunque sea "sin marcar" tras un reset), o si nunca se
// ha tocado ese día, "ausente" cuando hay una ausencia justificada activa
// (el motivo, si lo hay, se consulta aparte en Ausencias). Se usa tanto para
// rellenar Hoy como para que Historial/Estadísticas/exportaciones sean
// correctas aunque ese día no se haya abierto nunca en "Hoy".
function estadoAsistenciaEfectivo(kidId, iso){
  const day = S.days[iso];
  const asistencia = (day && day.asistencia) || {};
  if(Object.prototype.hasOwnProperty.call(asistencia, kidId)){
    return asistencia[kidId] || null;
  }
  if(ausenciaEnFecha(kidId, iso)) return 'ausente';
  return null;
}
function getDay(iso){
  if(!S.days[iso]){
    S.days[iso] = {valEstrellas:0, valTexto:'', actividades:[], asistencia:{}};
  }
  const day = S.days[iso];
  if(!day.actividades) day.actividades=[];
  if(!day.asistencia) day.asistencia={};
  // Si un niño/a tiene una ausencia justificada activa ese día y todavía no
  // se ha marcado nada, se rellena como "Ausente" por defecto — se puede
  // cambiar tocando su botón de asistencia, igual que cualquier otra marca.
  let cambiado = false;
  ninosDelDia(iso).forEach(k=>{
    if(!Object.prototype.hasOwnProperty.call(day.asistencia, k.id) && estadoAsistenciaEfectivo(k.id, iso)==='ausente'){
      day.asistencia[k.id] = 'ausente';
      cambiado = true;
    }
  });
  if(cambiado) saveDays();
  return day;
}

// ── Toast ──────────────────────────────────────────────────────
// El toast vive fuera de #root y se manipula directamente: mostrar un
// aviso (p. ej. "Observación copiada") nunca debe forzar un render completo
// de la pantalla ni mover el scroll.
let _toastTimer=null;
let _toastEl=null;
function toast(msg){
  if(!_toastEl){
    _toastEl = document.createElement('div');
    _toastEl.className = 'toast';
    document.body.appendChild(_toastEl);
  }
  _toastEl.textContent = msg;
  _toastEl.style.display = 'block';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>{ if(_toastEl) _toastEl.style.display='none'; }, 2600);
}

// ── Render principal ────────────────────────────────────────────
// Evita que cada micro-interacción (marcar asistencia, un toast, tocar
// un botón dentro de un modal…) parezca una "recarga": solo se resetea
// el scroll y se anima la entrada cuando de verdad cambia de pantalla/día,
// y el modal solo se desliza hacia arriba la primera vez que se abre.
let _lastRenderKey = null;
let _modalOpenBefore = false;
function render(){
  const root = document.getElementById('root');
  const key = S.view + '|' + S.fecha;
  const isNewScreen = key !== _lastRenderKey;
  _lastRenderKey = key;
  const modalOpenNow = !!S.modal;
  const isModalOpening = modalOpenNow && !_modalOpenBefore;
  _modalOpenBefore = modalOpenNow;
  const prevScrollY = window.scrollY;

  root.innerHTML = renderHeader() + renderContent() + renderNav() + renderModal();
  hydratePhotos();

  if(isNewScreen){
    window.scrollTo(0,0);
    const content = root.querySelector('.content');
    if(content) content.classList.add('view-enter');
  } else {
    // Algunos navegadores recortan el scroll al reemplazar el contenido;
    // lo restauramos explícitamente para que nunca "salte" hacia arriba.
    window.scrollTo(0, prevScrollY);
  }
  if(modalOpenNow && !isModalOpening){
    const modalEl = root.querySelector('.modal');
    if(modalEl) modalEl.classList.add('modal-static');
  }
}

function renderHeader(){
  const logo = localStorage.getItem(LSP+'logo') || _EDV_ICON;
  const titles = {hoy:'Hoy', ninos:'Niños y niñas', ausencias:'Ausencias justificadas', historial:'Historial', estadisticas:'Estadísticas', ajustes:'Ajustes'};
  return `<div class="header"><div class="hrow">
    <img class="hlogo" src="${logo}">
    <div style="flex:1">
      <div class="htitle">${esc(S.cfg.nombre)} · ${titles[S.view]}</div>
      <div class="hsub">Grupo ${esc(S.cfg.grupo)}</div>
    </div>
  </div></div>`;
}

function renderNav(){
  const items = [
    {v:'hoy', i:'📋', l:'Hoy'},
    {v:'ninos', i:'🧒', l:'Niños'},
    {v:'ausencias', i:'🟡', l:'Ausenc.'},
    {v:'historial', i:'📅', l:'Historial'},
    {v:'estadisticas', i:'📊', l:'Stats'},
    {v:'ajustes', i:'⚙️', l:'Ajustes'},
  ];
  return `<div class="nav">${items.map(it=>`
    <button class="nb ${S.view===it.v?'on':''}" onclick="setView('${it.v}')">
      <span class="ni">${it.i}</span>${it.l}
    </button>`).join('')}</div>`;
}

function setView(v){ S.view=v; S.modal=null; render(); }

function renderContent(){
  if(S.view==='hoy') return renderHoy();
  if(S.view==='ninos') return renderNinos();
  if(S.view==='ausencias') return renderAusencias();
  if(S.view==='historial') return renderHistorial();
  if(S.view==='estadisticas') return renderEstadisticas();
  if(S.view==='ajustes') return renderAjustes();
  return '';
}

// ================= VISTA: HOY =================
function cambiarDia(delta){
  const d = new Date(S.fecha+'T00:00:00Z');
  d.setUTCDate(d.getUTCDate()+delta);
  S.fecha = d.toISOString().slice(0,10);
  render();
}
function irAHoy(){ S.fecha = todayISO(); render(); }

function renderHoy(){
  const iso = S.fecha;
  const day = getDay(iso);
  const ninos = ninosDelDia(iso);
  const esLaborable = esCampDay(iso);

  let html = `<div class="content">`;

  const hayDatos = S.kids.length>0 || Object.keys(S.days).length>0;
  const diasBackup = diasDesdeUltimoBackup();
  if(hayDatos && (diasBackup===null || diasBackup>=7)){
    html += `<div class="warn-box" style="margin-bottom:14px;cursor:pointer" onclick="setView('ajustes')">⚠️ ${diasBackup===null?'Todavía no has exportado ninguna copia de seguridad.':'Llevas '+diasBackup+' días sin exportar una copia de seguridad.'} Toca para ir a Ajustes.</div>`;
  }

  html += `<div class="day-nav">
    <button class="day-nav-btn" onclick="cambiarDia(-1)">‹</button>
    <div class="day-nav-lbl" onclick="irAHoy()">
      <div class="day-nav-date">${fmtFechaEs(iso)}</div>
      <div class="day-nav-sub">${iso===todayISO()?'Hoy':'Toca para ir a hoy'}</div>
    </div>
    <button class="day-nav-btn" onclick="cambiarDia(1)">›</button>
  </div>`;

  if(!esLaborable){
    html += `<div class="empty"><div class="ei">🌴</div>Día no lectivo (fin de semana o fuera de julio–agosto).<br>Puedes seguir registrando si hubo actividad especial.</div>`;
  }

  if(ninos.length>0){
    const presentes = ninos.filter(k=>attEstadoInfo(day.asistencia[k.id]).label==='Presente').length;
    const ausentes = ninos.filter(k=>attEstadoInfo(day.asistencia[k.id]).label==='Ausente').length;
    const sinMarcar = ninos.length - presentes - ausentes;
    html += `<div class="day-summary">
      <div class="day-summary-item"><div class="day-summary-val green">${presentes}</div><div class="day-summary-lbl">Presentes</div></div>
      <div class="day-summary-item"><div class="day-summary-val red">${ausentes}</div><div class="day-summary-lbl">Ausentes</div></div>
      <div class="day-summary-item"><div class="day-summary-val">${sinMarcar}</div><div class="day-summary-lbl">Sin marcar</div></div>
    </div>`;
  }

  // Asistencia
  html += `<div class="section-card">
    <div class="sec-head"><span class="sec-icon">📝</span><span class="sec-title">Asistencia</span><span class="sec-count">${ninos.length} inscritos</span></div>`;
  if(ninos.length===0){
    html += `<div class="empty" style="padding:20px 8px"><div class="ei">🧒</div>No hay niños inscritos en esta fecha.<br>Revisa las semanas de inscripción en «Niños».</div>`;
  } else {
    html += `<div class="fl" style="margin-bottom:8px">Marcar todo el grupo</div>
    <div class="bulk-row">
      <button type="button" class="bulk-btn bp" onclick="marcarTodos('presente')">✅ Presentes</button>
      <button type="button" class="bulk-btn ba" onclick="marcarTodos('ausente')">❌ Ausentes</button>
    </div>
    <button type="button" class="bulk-reset" onclick="marcarTodos(null)">↺ Quitar todas las marcas de hoy</button>`;
    ninos.forEach(k=>{
      const est = day.asistencia[k.id] || null;
      const einfo = attEstadoInfo(est);
      const ausHoy = ausenciaEnFecha(k.id, iso);
      html += `<div class="att-row">
        <div class="att-avatar">${k.foto?`<img src="${k.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">`:esc((k.nombre||'?')[0].toUpperCase())}</div>
        <div class="att-name">
          <div class="att-name-txt">${esc(k.nombre)}</div>
          ${ausHoy?`<div class="att-note att-note-just">🟡 ${formatAusencia(ausHoy)}</div>`:''}
          ${k.obs?`<div class="att-note">📌 ${esc(k.obs)}</div>`:''}
        </div>
        <button class="att-cycle ${einfo.cls}" onclick="ciclarAsistencia('${k.id}')">${einfo.label}</button>
      </div>`;
    });
  }
  html += `</div>`;

  // Valoración colectiva
  html += `<div class="section-card">
    <div class="sec-head"><span class="sec-icon">⭐</span><span class="sec-title">Valoración colectiva</span></div>
    <div class="stars" style="margin-bottom:10px">${[1,2,3,4,5].map(n=>`<span class="${day.valEstrellas>=n?'fill':''}" onclick="setValEstrellas(${n})">★</span>`).join('')}</div>
    <textarea class="fi" placeholder="¿Cómo ha ido el grupo hoy en general? (opcional)" oninput="setValTexto(this.value)">${esc(day.valTexto)}</textarea>
  </div>`;

  // Actividades
  html += `<div class="sec-head" style="margin:16px 0 10px"><span class="sec-icon">🎯</span><span class="sec-title">Actividades del día</span>${day.actividades.length?`<span class="sec-count">${day.actividades.length}</span>`:''}</div>`;
  if(day.actividades.length===0){
    html += `<div class="empty" style="padding:24px 8px"><div class="ei">🎯</div>Todavía no has añadido ninguna actividad.</div>`;
  } else {
    day.actividades.forEach(act=>{
      html += renderActividad(iso, act);
    });
  }
  html += `<button class="btn-p" onclick="abrirModalActividad()">+ Añadir actividad</button>`;
  html += `<button class="btn-s" onclick="compartirResumenDia()">📤 Compartir resumen del día</button>`;

  html += `</div>`;
  return html;
}
// Junta asistencia, valoración y observaciones de actividades en un único
// texto para compartir (WhatsApp, email...) sin copiar actividad por actividad.
async function compartirResumenDia(){
  const iso = S.fecha;
  const day = getDay(iso);
  const ninos = ninosDelDia(iso);
  const presentes = ninos.filter(k=>attEstadoInfo(day.asistencia[k.id]).label==='Presente').length;
  const ausentes = ninos.filter(k=>attEstadoInfo(day.asistencia[k.id]).label==='Ausente').length;
  const sinMarcar = ninos.length - presentes - ausentes;

  let txt = `${S.cfg.nombre} · Grupo ${S.cfg.grupo}\n${fmtFechaEs(iso)}\n\n`;
  txt += `Asistencia: ${presentes} presentes / ${ausentes} ausentes`;
  if(sinMarcar>0) txt += ` / ${sinMarcar} sin marcar`;
  txt += `\n`;
  if(day.valEstrellas) txt += `Valoración del día: ${'★'.repeat(day.valEstrellas)}${'☆'.repeat(5-day.valEstrellas)}\n`;
  if(day.valTexto) txt += `${day.valTexto}\n`;
  if(day.actividades.length>0){
    txt += `\nActividades:\n`;
    day.actividades.forEach(act=>{
      txt += `\n• ${act.nombre||'Sin título'}\n`;
      if(act.obs) txt += `${act.obs}\n`;
    });
  }
  txt = txt.trim();

  if(navigator.share){
    try{ await navigator.share({title:`${S.cfg.nombre} · ${fmtFechaEs(iso)}`, text:txt}); return; }
    catch(e){ if(e && e.name==='AbortError') return; }
  }
  try{ await copiarAlPortapapeles(txt); toast('Resumen del día copiado'); }
  catch(e){ toast('No se pudo copiar. Revisa los permisos del navegador.'); }
}

// Botón único de asistencia: cada toque avanza al siguiente estado del ciclo.
const ATT_CICLO = [null, 'presente', 'ausente'];
function attEstadoInfo(est){
  if(est==='presente') return {cls:'att-cycle-presente', label:'Presente'};
  // 'justificado' se acepta como sinónimo legacy por si queda algún dato sin migrar.
  if(est==='ausente' || est==='justificado') return {cls:'att-cycle-ausente', label:'Ausente'};
  return {cls:'att-cycle-none', label:'Sin marcar'};
}
function ciclarAsistencia(kidId){
  const day = getDay(S.fecha);
  const actual = day.asistencia[kidId] || null;
  const idx = ATT_CICLO.indexOf(actual);
  day.asistencia[kidId] = ATT_CICLO[(idx+1) % ATT_CICLO.length];
  saveDays(); render();
}
function attNombrePlural(estado){
  if(estado==='presente') return 'presentes';
  if(estado==='ausente') return 'ausentes';
  return 'sin marcar';
}
// Marca de golpe a todos los niños/as inscritos ese día con el mismo estado
// (pide confirmación porque sustituye cualquier marca que hubiera ya puesta).
function marcarTodos(estado){
  const iso = S.fecha;
  const ninos = ninosDelDia(iso);
  if(ninos.length===0){ toast('No hay niños inscritos en esta fecha'); return; }
  const nombre = attNombrePlural(estado);
  if(!confirm(`¿Marcar a los ${ninos.length} niños/as inscritos hoy como ${nombre}? Esto sustituye cualquier marca que ya hubiera puesta hoy.`)) return;
  const day = getDay(iso);
  ninos.forEach(k=>{ day.asistencia[k.id] = estado; });
  saveDays(); render();
  toast(`Todos marcados como ${nombre}`);
}
function setValEstrellas(n){ const day=getDay(S.fecha); day.valEstrellas = (day.valEstrellas===n)?0:n; saveDays(); render(); }
function setValTexto(v){ getDay(S.fecha).valTexto = v; saveDays(); }
function setActNotas(actId, v){
  const day = getDay(S.fecha);

function borrarActividad(actId){

// ── Visor y descarga de fotos ────────────────────────────────────
function verFoto(actId, fotoId){
  S.modal = {tipo:'foto', actId, fotoId};
  render();
}
async function descargarFoto(fotoId){
  const url = await idbGet(fotoId);
  if(!url){ toast('No se pudo cargar la foto'); return; }

  // En móvil (iOS/Android) usamos la hoja de compartir nativa con la opción
  // "Guardar imagen"/"Guardar en Fotos": es el único camino fiable para que
  // una web deje la foto en la galería del dispositivo (por seguridad, ninguna
  // web puede escribir directamente en la galería sin que el usuario lo confirme).
  if(navigator.share && navigator.canShare){
    try{
      const resp = await fetch(url);
      const blob = await resp.blob();
      const file = new File([blob], `EDV_foto_${fotoId}.jpg`, {type: blob.type || 'image/jpeg'});
      if(navigator.canShare({files:[file]})){
        await navigator.share({files:[file]});
        toast('Elige "Guardar imagen" para añadirla a tu galería');
        return;
      }
    }catch(e){
      if(e && e.name==='AbortError') return; // el usuario cerró la hoja de compartir
      // si falla por otro motivo, seguimos con la descarga normal de abajo
    }
  }

  // Alternativa para ordenador o navegadores sin compartir archivos:
  // se guarda en la carpeta de descargas habitual del navegador.
  const a = document.createElement('a');
  a.href = url;
  a.download = `EDV_foto_${fotoId}.jpg`;
  document.body.appendChild(a); a.click(); a.remove();
  toast('Foto descargada a la carpeta de descargas del navegador');
}
function borrarFotoDesdeVisor(){
  if(!S.modal || S.modal.tipo!=='foto') return;
  if(!confirm('¿Eliminar esta foto?')) return;
  const {actId, fotoId} = S.modal;
  S.modal = null;
  borrarFoto(actId, fotoId);
}

function copiarAlPortapapeles(texto){
  if(navigator.clipboard && navigator.clipboard.writeText){
    return navigator.clipboard.writeText(texto);
  }
  // Fallback para navegadores sin Clipboard API
  const ta = document.createElement('textarea');
  ta.value = texto; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  return Promise.resolve();
}
async function copiarObservacion(actId){
  const day = getDay(S.fecha);
  const act = day.actividades.find(a=>a.id===actId);
  if(!act || !act.obs) return;
  try{
    await copiarAlPortapapeles(act.obs);
    toast('Observación copiada');
  }catch(e){
    toast('No se pudo copiar. Revisa los permisos del navegador.');
  }
}

// ── Generación de observaciones con IA (Claude API) ─────────────
// Estilo: punto intermedio entre un resumen plano de las notas del monitor
// y un registro institucional cargado de superlativos. Redacción cuidada y
// profesional, pero cercana y natural, sin acumular adjetivos elogiosos.
// No hace referencia al grupo/programa, a la fecha ni a ninguna valoración
// numérica interna: solo describe cómo se ha desarrollado la actividad.
const STYLE_GUIDE = `Eres un monitor de tiempo libre que redacta la observación diaria de una actividad para el registro oficial de un programa (escuela de verano / campamento infantil-juvenil).

Estilo y registro: profesional y cuidado, pero natural y cercano — un punto intermedio entre un simple resumen de notas y un informe institucional cargado de superlativos. Evita acumular varios adjetivos elogiosos seguidos o frases muy grandilocuentes tipo "ha resultado ser una experiencia sumamente enriquecedora que ha superado todas las expectativas"; usa como mucho una valoración positiva por frase, con naturalidad. Frases completas y bien construidas, en prosa fluida (nunca listas ni viñetas).

Contenido: toma como base los hechos que te indique el monitor en sus notas (qué se ha hecho, cómo ha ido, cualquier detalle relevante) y redacta una versión algo más completa y mejor escrita de esos mismos hechos, mejorando la redacción sin inflar ni dramatizar lo ocurrido. No inventes actividades, datos ni incidencias que no estén en las notas. Menciona, solo si encaja de forma natural con lo descrito, aspectos como la actitud del grupo, la participación, la colaboración o el ambiente general — sin forzarlo si las notas son breves.

Extensión: un único párrafo de entre 70 y 140 palabras.

Qué NO incluir: no menciones el nombre del grupo, del programa, la fecha, ni ninguna valoración numérica o puntuación interna — la observación se limita a describir la actividad de ese día, sin contexto administrativo. No incluyas saludos, firmas ni frases como "aquí tienes la observación": responde únicamente con el texto de la observación.

Incidencias: si las notas del monitor mencionan explícitamente una incidencia puntual (por ejemplo, un retraso en una recogida, un pequeño conflicto o un imprevisto), añade un segundo párrafo breve explicando que se gestionó con calma y profesionalidad, contactando con las personas responsables si procede, sin dramatizar y sin inventar nombres si no se han indicado explícitamente en las notas. Si no hay ninguna incidencia en las notas, no añadas ese segundo párrafo.

Nombres propios: usa siempre el nombre de la actividad EXACTAMENTE como te lo indique el monitor, letra por letra. No lo traduzcas, no lo "corrijas" ni lo sustituyas por el nombre de otro juego parecido o más conocido (por ejemplo, si el monitor escribe "Datchball", escribe "Datchball", nunca "dodgeball" u otra variante). Lo mismo aplica a cualquier otro nombre propio que aparezca en las notas (lugares, materiales, nombres de juegos inventados por el programa, etc.): consérvalos tal cual, sin normalizarlos.`;

async function generarObservacion(actId){
  const apiKey = localStorage.getItem(LSP+'apikey') || '';
  if(!apiKey){
    toast('Configura tu clave de API de Claude en Ajustes primero');
    return;
  }
  const day = getDay(S.fecha);
  const act = day.actividades.find(a=>a.id===actId);
  if(!act) return;
  if(!act.notas || !act.notas.trim()){
    toast('Añade unas notas rápidas antes de generar la observación');
    return;
  }
  act._generando = true; render();

  const model = localStorage.getItem(LSP+'aimodel') || 'claude-sonnet-5';
  const userMsg = `Actividad: ${act.nombre}
Notas del monitor sobre lo ocurrido en esta actividad:
"""
${act.notas}
"""
Redacta la observación de esta actividad siguiendo las indicaciones de estilo. Importante: el nombre de la actividad es literalmente "${act.nombre}" — escríbelo tal cual, sin traducirlo ni cambiarlo por el de otro juego.`;

  try{
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model,
        max_tokens: 500,
        system: STYLE_GUIDE,
        messages:[{role:'user', content:userMsg}]
      })
    });
    if(!resp.ok){
      const errBody = await resp.text();
      throw new Error('HTTP '+resp.status+': '+errBody.slice(0,200));
    }
    const data = await resp.json();
    const texto = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text.trim() : '';
    if(!texto) throw new Error('Respuesta vacía');
    act.obs = texto;
    saveDays();
    toast('Observación generada');
  }catch(e){
    console.error(e);
    toast('Error al generar: '+e.message.slice(0,80));
  }finally{
    act._generando = false;
    render();
  }
}

function guardarNino(){
  const nombre = document.getElementById('m-nino-nombre').value.trim();
  if(!nombre){ toast('Ponle un nombre al niño o niña'); return; }
  const k = S.modal.kid;
  const nombreMayus = nombre.toUpperCase();
  const duplicado = S.kids.some(x=>x.id!==k.id && x.nombre===nombreMayus);

// sí quita al niño/a de las ausencias registradas. Los días ya guardados en
// el historial no se tocan, pero al no estar en S.kids dejan de verse en

// ================= VISTA: AUSENCIAS =================
// Periodos de ausencia justificada, independientes del alta de cada niño/a:
// un niño/a puede tener varios a lo largo del verano. Es solo un recordatorio
// — la asistencia real del día se sigue marcando a mano en "Hoy".
function renderAusencias(){
  let html = `<div class="content">`;
  const hoy = todayISO();
  const items = S.ausencias.slice().sort((a,b)=>(a.desde||'').localeCompare(b.desde||''));

  html += `<div class="msub" style="margin-bottom:14px">Registra aquí los periodos en los que un niño/a avisa con antelación de que va a faltar. Puedes añadir tantos periodos como haga falta por niño/a.</div>`;

  if(items.length===0){
    html += `<div class="empty"><div class="ei">🟡</div>No hay ausencias justificadas registradas.</div>`;
  } else {
    html += `<div class="card">`;
    items.forEach(a=>{
      const kid = S.kids.find(k=>k.id===a.kidId);
      const nombre = kid ? kid.nombre : '(niño/a eliminado)';
      const activa = (!a.hasta || hoy<=a.hasta) && (!a.desde || hoy>=a.desde);
      const proxima = !activa && a.desde && hoy<a.desde;
      const estadoCls = activa?'activa':(proxima?'proxima':'pasada');
      const estadoTxt = activa?'Activa hoy':(proxima?'Próxima':'Finalizada');
      html += `<div class="kid-row" onclick="abrirModalAusencia('${a.id}')">
        <div class="kid-avatar">🟡</div>
        <div style="flex:1">
          <div class="kid-name">${esc(nombre)}</div>
          <div class="kid-meta">${formatAusencia(a)}</div>
        </div>
        <div class="au-estado ${estadoCls}">${estadoTxt}</div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `<button class="fab" onclick="abrirModalAusencia(null)">+</button>`;
  html += `</div>`;
  return html;
}
function abrirModalAusencia(id){
  if(id){
    const a = S.ausencias.find(x=>x.id===id);
    if(!a) return;
    S.modal = {tipo:'ausencia', id:a.id, kidId:a.kidId, desde:a.desde||'', hasta:a.hasta||'', motivo:a.motivo||''};
  } else {
    if(S.kids.length===0){ toast('Añade primero un niño o niña'); return; }
    const primero = S.kids.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'))[0];
    S.modal = {tipo:'ausencia', id:null, kidId:primero.id, desde:'', hasta:'', motivo:''};
  }
  render();
}
function guardarAusencia(){
  const m = S.modal;
  const kidId = document.getElementById('m-aus-kid').value;
  if(!kidId){ toast('Elige un niño o niña'); return; }
  const desde = m.desde || '';
  const hasta = m.hasta || '';
  const motivo = (m.motivo||'').trim();
  if(!desde && !hasta){ toast('Indica al menos una fecha (desde o hasta)'); return; }
  if(desde && hasta && desde>hasta){ toast('La fecha "Desde" no puede ser posterior a "Hasta"'); return; }
  if(m.id){
    const a = S.ausencias.find(x=>x.id===m.id);
    a.kidId = kidId; a.desde = desde; a.hasta = hasta; a.motivo = motivo;
  } else {
    S.ausencias.push({id:uid(), kidId, desde, hasta, motivo});
  }
  saveAusencias();
  S.modal=null; render();
  toast('Guardado');
}
function borrarAusencia(id){
  if(!confirm('¿Eliminar este periodo de ausencia justificada?')) return;
  S.ausencias = S.ausencias.filter(a=>a.id!==id);
  saveAusencias();
  S.modal=null; render();
}

// ================= VISTA: HISTORIAL =================
function renderHistorial(){
  let html = `<div class="content">`;
  const fechas = Object.keys(S.days).filter(iso=>{
    const day = S.days[iso];
    return day.actividades.length>0 || Object.keys(day.asistencia||{}).length>0 || day.valTexto;
  }).sort().reverse();

  html += `<div class="tab-row">
    <button class="tab-btn ${S.histMesFiltro==='todos'?'on':''}" onclick="setHistFiltro('todos')">Todos</button>
    <button class="tab-btn ${S.histMesFiltro==='julio'?'on':''}" onclick="setHistFiltro('julio')">Julio</button>
    <button class="tab-btn ${S.histMesFiltro==='agosto'?'on':''}" onclick="setHistFiltro('agosto')">Agosto</button>
  </div>`;

  const filtradas = fechas.filter(iso=> S.histMesFiltro==='todos' || mesDe(iso)===S.histMesFiltro);

  if(filtradas.length===0){
    html += `<div class="empty"><div class="ei">📅</div>No hay días registrados todavía.</div>`;
  } else {
    html += `<div class="card">`;
    filtradas.forEach(iso=>{
      const day = S.days[iso];
      let presentes=0, ausentes=0;
      ninosDelDia(iso).forEach(k=>{
        const est = estadoAsistenciaEfectivo(k.id, iso);
        if(est==='presente') presentes++;
        else if(est==='ausente') ausentes++;
      });
      html += `<div class="hist-row" onclick="irADia('${iso}')">
        <div class="hist-date">${fmtFechaEs(iso)}</div>
        <div class="hist-meta">${day.actividades.length} actividad(es) · ${presentes} presentes / ${ausentes} ausentes ${day.valEstrellas?(' · '+'★'.repeat(day.valEstrellas)):''}</div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}
function setHistFiltro(f){ S.histMesFiltro=f; render(); }
function irADia(iso){ S.fecha=iso; S.view='hoy'; render(); }

// Colores de marca reutilizados en las cabeceras y detalles del PDF.
const PDF_TEAL_DARK = [11,93,82], PDF_AMBER = [245,166,35], PDF_DARK=[8,16,20],
      PDF_GRAY=[110,140,135], PDF_GREEN=[22,163,74], PDF_ORANGE=[217,119,6], PDF_RED=[220,38,38],
      PDF_TEAL_BG=[236,247,246], PDF_AMBER_BG=[255,250,240];

// Cabecera común (logo si existe, título, subtítulo, línea) para los PDF de EDV.
function pdfCabecera(doc, titulo, subtitulo){
  const pageW = doc.internal.pageSize.getWidth();
  const logoData = localStorage.getItem(LSP+'logo');
  let textX = 14;
  if(logoData){
    try{ doc.addImage(logoData, 'JPEG', 14, 9, 17, 17); textX = 35; }catch(e){}
  }
  doc.setTextColor(...PDF_DARK);
  doc.setFont('helvetica','bold'); doc.setFontSize(17);
  doc.text(titulo, textX, 17);
  doc.setFont('helvetica','normal'); doc.setFontSize(10);
  doc.setTextColor(...PDF_GRAY);
  doc.text(subtitulo, textX, 23);
  doc.setDrawColor(...PDF_TEAL_DARK); doc.setLineWidth(0.8);
  doc.line(14, 29, pageW-14, 29);
  return pageW;
}
// Pie de página (fecha de generación + nº de página) en todas las páginas.
function pdfPiePagina(doc){
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const pageCount = doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setFont('helvetica','normal'); doc.setFontSize(8);
    doc.setTextColor(...PDF_GRAY);
    doc.text('Generado el '+new Date().toLocaleDateString('es-ES'), 14, pageH-8);
    doc.text(`Página ${i} de ${pageCount}`, pageW-14, pageH-8, {align:'right'});
  }
}
// Tabla de ausencias justificadas (niño/a, fechas, motivo) usada como apéndice
// tanto en el informe de grupo como en la ficha individual.
function pdfTablaAusencias(doc, ausencias, startY, conNombre){
  const f = iso => iso ? fmtDDMM(new Date(iso+'T00:00:00Z')) : '—';
  const head = conNombre ? ['Niño/a','Desde','Hasta','Motivo'] : ['Desde','Hasta','Motivo'];
  const body = ausencias.map(a=>{
    const fila = [f(a.desde), f(a.hasta), a.motivo||'—'];
    if(conNombre){ const kid = S.kids.find(k=>k.id===a.kidId); fila.unshift(kid?kid.nombre:'(eliminado)'); }
    return fila;
  });
  doc.autoTable({
    startY,
    head:[head],
    body,
    styles:{fontSize:8.5, textColor:PDF_DARK},
    headStyles:{fillColor:PDF_AMBER, textColor:[36,23,5], fontStyle:'bold'},
    alternateRowStyles:{fillColor:PDF_AMBER_BG},
  });
}

function exportarPDF(){
  try{
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF();
    const pageW = pdfCabecera(doc, S.cfg.nombre, `Grupo ${S.cfg.grupo} · ${S.cfg.anio} · Informe de asistencia`);

    const fechas = Object.keys(S.days).sort();
    const kidsActivos = S.kids.filter(k=>!k.archivado);
    const kidsArchivados = S.kids.filter(k=>k.archivado);

    let sumaPct=0, kidsConDias=0;
    const filas = S.kids.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).map(k=>{
      let dias=0, pres=0, aus=0;
      fechas.forEach(iso=>{
        if(!ninoInscritoEn(k, iso)) return;
        const est = estadoAsistenciaEfectivo(k.id, iso);
        if(est){ dias++; if(est==='presente')pres++; else if(est==='ausente')aus++; }
      });
      const pct = dias>0 ? Math.round(pres/dias*100) : null;
      if(pct!==null){ sumaPct+=pct; kidsConDias++; }
      return {nombre:k.nombre+(k.archivado?' (archivado)':''), dias, pres, aus, pct};
    });
    const pctMedio = kidsConDias>0 ? Math.round(sumaPct/kidsConDias) : 0;

    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...PDF_DARK);
    doc.text(`Niños/as activos: ${kidsActivos.length}   ·   Archivados: ${kidsArchivados.length}   ·   Días registrados: ${fechas.length}   ·   % asistencia media: ${pctMedio}%`, 14, 36);

    doc.autoTable({
      startY:41,
      head:[['Nombre','Días','Presente','Ausente','% asistencia']],
      body: filas.map(f=>[f.nombre, f.dias, f.pres, f.aus, f.pct!==null?f.pct+'%':'—']),
      styles:{fontSize:9, textColor:PDF_DARK},
      headStyles:{fillColor:PDF_TEAL_DARK, textColor:[255,255,255], fontStyle:'bold'},
      alternateRowStyles:{fillColor:PDF_TEAL_BG},
      didParseCell: function(data){
        if(data.section==='body' && data.column.index===4){
          const pct = filas[data.row.index].pct;
          if(pct!==null){
            data.cell.styles.textColor = pct>=90?PDF_GREEN:(pct>=75?PDF_ORANGE:PDF_RED);
            data.cell.styles.fontStyle='bold';
          }
        }
      }
    });

    if(S.ausencias.length>0){
      let y2 = doc.lastAutoTable.finalY + 12;
      if(y2 > doc.internal.pageSize.getHeight()-40){ doc.addPage(); y2=20; }
      doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(...PDF_DARK);
      doc.text('Ausencias justificadas registradas', 14, y2);
      pdfTablaAusencias(doc, S.ausencias.slice().sort((a,b)=>(a.desde||'').localeCompare(b.desde||'')), y2+4, true);
    }

    pdfPiePagina(doc);
    doc.save(`EDV_${S.cfg.grupo}_informe.pdf`);
    toast('PDF exportado');
  }catch(e){ console.error(e); toast('Error al exportar PDF'); }
}

// Ficha individual de un niño/a: días, presente/ausente, % asistencia,
// detalle día a día, sus ausencias justificadas registradas y sus observaciones.
function exportarFichaPDF(kidId){
  try{
    const k = S.kids.find(x=>x.id===kidId);
    if(!k){ toast('Niño/a no encontrado'); return; }
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF();
    pdfCabecera(doc, k.nombre, `${S.cfg.nombre} · Grupo ${S.cfg.grupo} · ${S.cfg.anio}${k.archivado?' · Archivado':''}`);

    const fechas = Object.keys(S.days).sort();
    let dias=0, pres=0, aus=0;
    const filasDias = [];
    fechas.forEach(iso=>{
      if(!ninoInscritoEn(k, iso)) return;
      const est = estadoAsistenciaEfectivo(k.id, iso);
      if(est){ dias++; if(est==='presente')pres++; else if(est==='ausente')aus++; }
      filasDias.push([fmtFechaEs(iso), est==='presente'?'Presente':est==='ausente'?'Ausente':'Sin marcar']);
    });
    const pct = dias>0 ? Math.round(pres/dias*100) : 0;

    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...PDF_DARK);
    doc.text(`Días inscrito: ${dias}   ·   Presente: ${pres}   ·   Ausente: ${aus}   ·   % asistencia: ${dias>0?pct+'%':'—'}`, 14, 36);

    doc.autoTable({
      startY:41,
      head:[['Fecha','Estado']],
      body: filasDias,
      styles:{fontSize:8.5, textColor:PDF_DARK},
      headStyles:{fillColor:PDF_TEAL_DARK, textColor:[255,255,255], fontStyle:'bold'},
      alternateRowStyles:{fillColor:PDF_TEAL_BG},
    });

    const ausK = ausenciasDeNino(k.id);
    if(ausK.length>0){
      let y2 = doc.lastAutoTable.finalY + 12;
      if(y2 > doc.internal.pageSize.getHeight()-40){ doc.addPage(); y2=20; }
      doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(...PDF_DARK);
      doc.text('Ausencias justificadas registradas', 14, y2);
      pdfTablaAusencias(doc, ausK, y2+4, false);
    }

    if(k.obs){
      let y3 = (doc.lastAutoTable ? doc.lastAutoTable.finalY : 41) + 12;
      if(y3 > doc.internal.pageSize.getHeight()-40){ doc.addPage(); y3=20; }
      doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...PDF_DARK);
      doc.text('Observaciones', 14, y3);
      doc.setFont('helvetica','normal'); doc.setFontSize(9.5);
      const pageW = doc.internal.pageSize.getWidth();
      doc.text(doc.splitTextToSize(k.obs, pageW-28), 14, y3+7);
    }

    pdfPiePagina(doc);
    doc.save(`EDV_${k.nombre.replace(/\s+/g,'_')}_ficha.pdf`);
    toast('Ficha individual exportada');
  }catch(e){ console.error(e); toast('Error al exportar la ficha'); }
}

function exportarExcel(){
  try{
    const fechas = Object.keys(S.days).sort();
    const wsData = [['Nombre', ...fechas.map(f=>f)]];
    S.kids.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre,'es')).forEach(k=>{
      const row = [k.nombre+(k.archivado?' (archivado)':'')];
      fechas.forEach(iso=>{
        if(!ninoInscritoEn(k, iso)){ row.push(''); return; }
        const est = estadoAsistenciaEfectivo(k.id, iso);
        row.push(est==='presente'?'P':est==='ausente'?'A':'');
      });
      wsData.push(row);
    });
    const ws = XLSX.utils.aoa_to_sheet(wsData);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Asistencia');
    XLSX.writeFile(wb, `EDV_${S.cfg.grupo}_asistencia.xlsx`);
    toast('Excel exportado');
  }catch(e){ console.error(e); toast('Error al exportar Excel'); }
}

function guardarAjustesIA(){
  const key = document.getElementById('ajustes-apikey').value.trim();

function exportarBackupJSON(){
  const backup = {version:1, exportado: new Date().toISOString(), cfg:S.cfg, kids:S.kids, days:S.days, ausencias:S.ausencias};
  const blob = new Blob([JSON.stringify(backup,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `EDV_backup_${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  localStorage.setItem(LSP+'lastBackup', todayISO());
  toast('Copia de seguridad descargada (no incluye fotos)');
}
// Días transcurridos desde la última exportación (null si nunca se ha exportado).
function diasDesdeUltimoBackup(){
  const last = localStorage.getItem(LSP+'lastBackup');
  if(!last) return null;
  const d1 = new Date(last+'T00:00:00Z');
  const d2 = new Date(todayISO()+'T00:00:00Z');
  return Math.round((d2-d1)/86400000);
}
function borrarTodosLosDatos(){
  if(!confirm('Esto borrará niños, asistencia, actividades y fotos de este dispositivo. ¿Seguro?')) return;
  if(!confirm('Confirma otra vez: esta acción no se puede deshacer.')) return;
  Object.keys(localStorage).filter(k=>k.startsWith(LSP)).forEach(k=>localStorage.removeItem(k));
  indexedDB.deleteDatabase('edvFotos');
  location.reload();
}

      <div class="msub">Añade el nombre; después podrás escribir notas y generar la observación con IA.</div>
      <div class="fg"><label class="fl">Nombre de la actividad</label>
        <input class="fi" id="m-act-nombre" list="dl-actividades" value="${esc(m.nombre||'')}" placeholder="Ej: Datchball, piscina, taller de manualidades..." oninput="S.modal.nombre=this.value">
        <datalist id="dl-actividades">${nombresActividadesPrevias().map(n=>`<option value="${esc(n)}">`).join('')}</datalist>
      </div>
      <button type="button" class="btn-p" onclick="confirmarNuevaActividad()">Añadir</button>
      <button type="button" class="btn-s" onclick="cerrarModal()">Cancelar</button>`;
  }

  if(m.tipo==='nino'){
    const k = m.kid;
    const semanasSueltas = listaSemanas().filter(s=>{
      if(s.mes==='julio' && k.julioCompleto) return false;
      if(s.mes==='agosto' && k.agostoCompleto) return false;
      return true;
    });
    inner = `<div class="mhandle"></div>
      <div class="mtitle">${k.id?'Editar':'Nuevo'} niño/a</div>
      <div class="logo-upload" style="border-radius:50%" onclick="subirFotoNino()">
        ${k.foto?`<img src="${k.foto}">`:'<span style="font-size:26px">🧒</span>'}
      </div>
      <div class="fg"><label class="fl">Nombre</label>
        <input class="fi" id="m-nino-nombre" style="text-transform:uppercase" value="${esc(k.nombre)}" placeholder="Nombre y apellido" oninput="S.modal.kid.nombre=this.value">
      </div>
      <div class="fl" style="margin-bottom:8px">Periodo de inscripción</div>
      <div class="toggle-row">
        <div class="toggle-info"><div class="toggle-title">Julio completo</div></div>
        <button type="button" class="tswitch ${k.julioCompleto?'on':''}" onclick="toggleModalNinoMes('julioCompleto')"></button>
      </div>
      <div class="toggle-row">
        <div class="toggle-info"><div class="toggle-title">Agosto completo</div></div>
        <button type="button" class="tswitch ${k.agostoCompleto?'on':''}" onclick="toggleModalNinoMes('agostoCompleto')"></button>
      </div>
      ${semanasSueltas.length>0 ? `
      <div class="fl" style="margin:12px 0 8px">O semanas sueltas (si no está el mes completo)</div>
      <div class="week-grid">
        ${semanasSueltas.map(s=>`<div class="week-chip ${(k.semanas||[]).includes(s.key)?'on':''}" onclick="toggleModalNinoSemana('${s.key}')">${s.mes==='julio'?'JUL':'AGO'} ${s.label}</div>`).join('')}
      </div>` : ''}
      <div class="fg" style="margin-top:14px">
        <label class="fl">Observaciones</label>
        <textarea class="fi" id="m-nino-obs" placeholder="Ej: no vendrá hasta el día 15, recogida solo por su madre, alergia a los frutos secos..." oninput="S.modal.kid.obs=this.value">${esc(k.obs)}</textarea>
      </div>
      <button type="button" class="btn-p" onclick="guardarNino()">Guardar</button>
      ${k.id?(k.archivado
        ? `<button type="button" class="btn-s" onclick="reactivarNino()">↩️ Reactivar niño/a</button>`
        : `<button type="button" class="btn-d" onclick="archivarNino()">🗄️ Archivar niño/a</button>`
      ):''}
      ${k.id?`<div style="text-align:center;margin-top:10px"><span style="font-size:11.5px;color:var(--td);text-decoration:underline;cursor:pointer" onclick="borrarNinoDefinitivo()">Eliminar definitivamente (borra su historial de Estadísticas)</span></div>`:''}
      <button type="button" class="btn-s" onclick="cerrarModal()">Cancelar</button>`;
  }

  if(m.tipo==='ausencia'){
    const kidsOrd = S.kids.slice().sort((a,b)=>a.nombre.localeCompare(b.nombre,'es'));
    inner = `<div class="mhandle"></div>
      <div class="mtitle">${m.id?'Editar':'Nuevo'} periodo de ausencia</div>
      <div class="msub">Es solo un recordatorio: la asistencia del día se sigue marcando a mano en «Hoy».</div>
      <div class="fg"><label class="fl">Niño/a</label>
        <select class="fi" id="m-aus-kid" onchange="S.modal.kidId=this.value">
          ${kidsOrd.map(k=>`<option value="${k.id}" ${m.kidId===k.id?'selected':''}>${esc(k.nombre)}</option>`).join('')}
        </select>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">Desde</label>
          <input class="fi" type="date" id="m-aus-desde" value="${m.desde||''}" oninput="S.modal.desde=this.value">
        </div>
        <div class="fg"><label class="fl">Hasta</label>
          <input class="fi" type="date" id="m-aus-hasta" value="${m.hasta||''}" oninput="S.modal.hasta=this.value">
        </div>
      </div>
      <div class="fg"><label class="fl">Motivo (opcional)</label>
        <input class="fi" id="m-aus-motivo" placeholder="Ej: vacaciones familiares, cita médica..." value="${esc(m.motivo||'')}" oninput="S.modal.motivo=this.value">
      </div>
      <button type="button" class="btn-p" onclick="guardarAusencia()">Guardar</button>
      ${m.id?`<button type="button" class="btn-d" onclick="borrarAusencia('${m.id}')">Eliminar periodo</button>`:''}
      <button type="button" class="btn-s" onclick="cerrarModal()">Cancelar</button>`;
  }

  if(m.tipo==='foto'){
    inner = `<div class="mhandle"></div>
      <div class="photo-view-wrap"><img class="photo-view-img" data-photo-id="${m.fotoId}"></div>
      <button type="button" class="btn-p" onclick="descargarFoto('${m.fotoId}')">💾 Guardar en galería</button>
      <button type="button" class="btn-d" onclick="borrarFotoDesdeVisor()">🗑️ Eliminar foto</button>
      <button type="button" class="btn-s" onclick="cerrarModal()">Cerrar</button>`;
  }

  return `<div class="modal-bg" onclick="if(event.target===this)cerrarModal()"></div><div class="modal">${inner}</div>`;
}

// ================= Inputs de archivo (logo, foto niño, fotos actividad, import) =================
function fileToDataURL(file, maxDim, cb){
  const reader = new FileReader();
  reader.onload = ()=>{
    const img = new Image();
    img.onload = ()=>{
      let {width, height} = img;
      if(width>maxDim || height>maxDim){
        const scale = maxDim/Math.max(width,height);
        width = Math.round(width*scale); height = Math.round(height*scale);
      }
      const cv = document.createElement('canvas'); cv.width=width; cv.height=height;
      cv.getContext('2d').drawImage(img,0,0,width,height);
      cb(cv.toDataURL('image/jpeg', 0.82));
    };
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
}

document.getElementById('fileLogo').addEventListener('change', function(e){
  const file = e.target.files[0]; if(!file) return;
  fileToDataURL(file, 400, dataURL=>{
    localStorage.setItem(LSP+'logo', dataURL);
    render(); toast('Logo actualizado');
  });
  e.target.value='';
});

document.getElementById('fileKidPhoto').addEventListener('change', function(e){
  const file = e.target.files[0]; if(!file || !S.modal || S.modal.tipo!=='nino') return;
  fileToDataURL(file, 300, dataURL=>{
    S.modal.kid.foto = dataURL;
    render();
  });
  e.target.value='';
});

document.getElementById('fileActPhoto').addEventListener('change', async function(e){
  const actId = e.target.dataset.actId;
  const files = Array.from(e.target.files||[]);
  if(!actId || files.length===0) return;
  const day = getDay(S.fecha);
  const act = day.actividades.find(a=>a.id===actId);
  if(!act) return;
  for(const file of files){
    await new Promise(resolve=>{
      fileToDataURL(file, 1000, async dataURL=>{
        const fid = uid();
        await idbPut(fid, dataURL);
        act.fotos = act.fotos||[];
        act.fotos.push(fid);
        resolve();
      });
    });
  }
  saveDays(); render();
  e.target.value='';
});

document.getElementById('fileImportJson').addEventListener('change', function(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!confirm('Esto sustituirá los datos actuales de niños, asistencia y actividades (no las fotos) por los del archivo. ¿Continuar?')) return;
      S.cfg = data.cfg || S.cfg;
      S.kids = data.kids || [];
      S.days = data.days || {};
      S.ausencias = data.ausencias || [];
      saveCfg(); saveKids(); saveDays(); saveAusencias();
      render(); toast('Datos restaurados');
    }catch(err){ toast('Archivo inválido'); }
  };
  reader.readAsText(file);
  e.target.value='';
});

// ── Arranque ──
render();
</script>
